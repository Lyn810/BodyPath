                                    {sorted.map(([label, count]) => (
                                        <div key={label} className="flex items-center gap-3">
                                            <span className="text-xs text-[#8D7B6D] w-14 text-right shrink-0">{label}</span>
                                            <div className="flex-1 bg-[#FAF7F4] rounded-full h-2 overflow-hidden">
                                                <div className="h-2 rounded-full bg-[#C8A882]" style={{width: (count/maxVal*100)+'%'}}></div>
                                            </div>
                                            <span className="text-xs text-[#A89080] w-4 shrink-0">{count}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </section>}
            </div>
        );
    }

    function MiniLab({ records, setRecords, onDetail, onSupplement }) {
        const today = new Date().toISOString().slice(0, 10);
        const [selectedDate, setSelectedDate] = useState(today);
        const [expId, setExpId] = useState(null);
        const [diaryLinkId, setDiaryLinkId] = useState(null);
        const [newLab, setNewLab] = useState({ action: '', effect: 0 });
        const [editLabId, setEditLabId] = React.useState(null);
        const [editLabText, setEditLabText] = React.useState('');
        const [editLabEffect, setEditLabEffect] = React.useState(0);

        // 搜尋狀態
        const [searchOpen, setSearchOpen] = React.useState(false);
        const [searchKeyword, setSearchKeyword] = React.useState('');
        // row1: '' | 'body' | 'mood' | 'diary'
        // row2: '' | 'part' | 'emotion' | 'diary_title'
        const [filterRow1, setFilterRow1] = React.useState('');
        const [filterRow2, setFilterRow2] = React.useState('');
        const isSearching = searchOpen && (searchKeyword.trim() || filterRow1 || filterRow2);

        // 當月所有天（固定顯示當月）
        const [viewMonth, setViewMonth] = useState(today.slice(0, 7));
        const daysInMonth = new Date(parseInt(viewMonth.slice(0,4)), parseInt(viewMonth.slice(5,7)), 0).getDate();
        const monthPrefix = viewMonth; // e.g. "2026-03"

        // 搜尋邏輯：跨所有日期
        const BUILT_IN_DIARY_LABELS = { f1:'夢境故事', f2:'飲食情況', f3:'對自己的新發現', f4:'內在呼喚', f5:'溫柔回應', f6:'最深刻的事', f7:'幸運的事', f8:'今日的加分行為' };

        const matchRecord = (r) => {
            // row1 類型篩選
            if (filterRow1 && r.type !== filterRow1) return false;

            // row2 維度篩選：只保留符合維度的紀錄類型
            if (filterRow2 === 'part' && r.type !== 'body') return false;
            if (filterRow2 === 'emotion' && r.type !== 'mood') return false;
            if (filterRow2 === 'diary_title' && r.type !== 'diary') return false;

            const kw = searchKeyword.trim().toLowerCase();
            if (!kw) return true; // 只有篩選，無關鍵字

            // 根據 row2 維度決定搜尋範圍
            const contentParts = [];

            if (filterRow2 === 'part') {
                // 只搜尋部位（area / part）
                if (r.area) contentParts.push(r.area);
                if (r.part) contentParts.push(r.part);
            } else if (filterRow2 === 'emotion') {
                // 只搜尋情緒標籤
                Object.keys(r.moods || {}).forEach(m => contentParts.push(m));
            } else if (filterRow2 === 'diary_title') {
                // 只搜尋日記標題（欄位名稱）
                const df = r.diaryFields || {};
                const cl = r.customLabels || {};
                Object.keys(BUILT_IN_DIARY_LABELS).forEach(k => { if (df[k] !== undefined) contentParts.push(BUILT_IN_DIARY_LABELS[k]); });
                Object.entries(cl).forEach(([, label]) => contentParts.push(label));
            } else {
                // 無 row2 篩選：搜尋所有內容
                if (r.type === 'body') {
                    if (r.area) contentParts.push(r.area);
                    if (r.part) contentParts.push(r.part);
                    (r.sensationData || []).forEach(s => contentParts.push(s.label));
                    if (r.bodyLanguage) contentParts.push(r.bodyLanguage);
                    if (r.trueFeeling) contentParts.push(r.trueFeeling);
                    if (r.timingBefore) contentParts.push(r.timingBefore);
                    if (r.timingDuring) contentParts.push(r.timingDuring);
                    if (r.timingAfter) contentParts.push(r.timingAfter);
                } else if (r.type === 'mood') {
                    Object.keys(r.moods || {}).forEach(m => contentParts.push(m));
                    if (r.bodyLanguage) contentParts.push(r.bodyLanguage);
                    if (r.trueFeeling) contentParts.push(r.trueFeeling);
                    if (r.timingBefore) contentParts.push(r.timingBefore);
                    if (r.timingDuring) contentParts.push(r.timingDuring);
                    if (r.timingAfter) contentParts.push(r.timingAfter);
                } else if (r.type === 'diary') {
                    const df = r.diaryFields || {};
                    const cl = r.customLabels || {};
                    Object.keys(BUILT_IN_DIARY_LABELS).forEach(k => { if (df[k] !== undefined) contentParts.push(BUILT_IN_DIARY_LABELS[k]); });
                    Object.entries(cl).forEach(([, label]) => contentParts.push(label));
                    Object.values(df).forEach(v => { if (v) contentParts.push(v); });
                    if (r.sentence) contentParts.push(r.sentence);
                }
                (r.lab || []).forEach(l => { if (l.action) contentParts.push(l.action); });
            }

            return contentParts.some(p => p.toLowerCase().includes(kw));
        };

        const searchResults = isSearching
            ? [...records].filter(matchRecord).sort((a, b) => new Date(b.date) - new Date(a.date))
            : [];

        // 高亮關鍵字
        const highlight = (text) => {
            if (!searchKeyword.trim() || !text) return text;
            const kw = searchKeyword.trim();
            const idx = text.toLowerCase().indexOf(kw.toLowerCase());
            if (idx === -1) return text;
            return (
                <>
                    {text.slice(0, idx)}
                    <mark className="bg-[#C8A882]/20 text-[#8D7B6D] rounded px-0.5">{text.slice(idx, idx + kw.length)}</mark>
                    {text.slice(idx + kw.length)}
                </>
            );
        };

        const filtered = records.filter(r => r.date === selectedDate);

        const saveLab = (recordId) => {
            if (!newLab.action.trim()) return;
            setRecords(records.map(r => {
                if (r.id !== recordId) return r;
                const existing = r.lab || [];
                return { ...r, lab: [...existing, { ...newLab, id: Date.now() }] };
            }));
            setExpId(null);
            setDiaryLinkId(null);
            setNewLab({ action: '', effect: 0 });
        };

        const deleteLab = (recordId, labId) => {
            if (!window.confirm("確定要刪除這筆對策紀錄嗎？")) return;
            setRecords(records.map(r => {
                if (r.id !== recordId) return r;
                return { ...r, lab: (r.lab || []).filter(l => l.id !== labId) };
            }));
        };

        return (
            <div className="p-8 space-y-8 animate-fade-in pb-32">
                <header className="pt-4 flex items-center justify-between">
                    <div className="flex items-center gap-2.5">
                        <Icon.Calendar />
                        <h2 className="text-base font-light text-[#C8A882] tracking-[0.3em]">調頻月曆</h2>
                    </div>
                    <div className="flex items-center gap-2.5">
                        <input type="month" value={viewMonth} onChange={e => setViewMonth(e.target.value)}
                            className="bg-transparent text-sm font-medium text-[#C8A882] tracking-widest outline-none text-right" />
                        <button onClick={() => { setSearchOpen(o => !o); if (searchOpen) { setSearchKeyword(''); setFilterRow1(''); setFilterRow2(''); } }}
                            className={`w-8 h-8 flex items-center justify-center rounded-full border transition-all shrink-0 ${searchOpen ? 'bg-[#C8A882] border-[#C8A882]' : 'border-[#F3E5D8]'}`}>
                            <svg className={`w-3.5 h-3.5 ${searchOpen ? 'text-white' : 'text-[#C8A882]'}`} fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                            </svg>
                        </button>
                    </div>
                </header>

                {/* 搜尋面板 */}
                {searchOpen && (
                    <div className="space-y-3 animate-fade-in">
                        {/* 關鍵字輸入 */}
                        <div className="flex items-center gap-3 px-5 py-3 bg-[#FAF7F4] rounded-[2rem] border border-[#F3E5D8]">
                            <svg className="w-3.5 h-3.5 text-[#D1C4B9] shrink-0" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                            </svg>
                            <input
                                value={searchKeyword}
                                onChange={e => setSearchKeyword(e.target.value)}
                                placeholder="輸入關鍵字..."
                                className="flex-1 bg-transparent text-sm outline-none text-[#8D7B6D] placeholder-[#D1C4B9] font-light"
                                autoFocus
                            />
                            {searchKeyword && (
                                <button onClick={() => setSearchKeyword('')} className="text-[#D1C4B9] text-base leading-none shrink-0">×</button>
                            )}
                        </div>

                        {/* 第一排：紀錄類型 */}
                        <div className="flex gap-1.5">
                            {[['', '全部'], ['body', '身體'], ['mood', '心情'], ['diary', '日記']].map(([val, label]) => (
                                <button key={val} onClick={() => { setFilterRow1(val); setFilterRow2(''); }}
                                    className={`flex-1 py-1.5 rounded-full text-xs font-medium tracking-wide transition-all border ${filterRow1 === val ? 'bg-[#C8A882] text-white border-[#C8A882]' : 'border-[#F3E5D8] text-[#A89080]'}`}>
                                    {label}
                                </button>
                            ))}
                        </div>

                        {/* 第二排：內容維度 */}
                        <div className="flex gap-1.5">
                            {[
                                ['', '不限'],
                                ['part', '部位'],
                                ['emotion', '情緒'],
                                ['diary_title', '日記標題'],
                            ].map(([val, label]) => {
                                // 根據 row1 決定第二排哪些可選
                                const disabled =
                                    (val === 'part' && filterRow1 === 'mood') ||
                                    (val === 'part' && filterRow1 === 'diary') ||
                                    (val === 'emotion' && filterRow1 === 'body') ||
                                    (val === 'emotion' && filterRow1 === 'diary') ||
                                    (val === 'diary_title' && filterRow1 === 'body') ||
                                    (val === 'diary_title' && filterRow1 === 'mood');
                                return (
                                    <button key={val}
                                        onClick={() => !disabled && setFilterRow2(val)}
                                        className={`flex-1 py-1.5 rounded-full text-xs font-medium tracking-wide transition-all border ${filterRow2 === val ? 'bg-[#8D7B6D] text-white border-[#8D7B6D]' : disabled ? 'border-[#F3E5D8] text-[#D1C4B9] cursor-default' : 'border-[#F3E5D8] text-[#A89080]'}`}>
                                        {label}
                                    </button>
                                );
                            })}
                        </div>

                        {/* 結果統計 */}
                        {isSearching && (
                            <p className="text-[10px] text-[#D1C4B9] tracking-widest pl-1">
                                找到 <span className="text-[#C8A882]">{searchResults.length}</span> 筆
                                {searchKeyword.trim() && <span> · 「<span className="text-[#C8A882]">{searchKeyword.trim()}</span>」</span>}
                            </p>
                        )}
                    </div>
                )}

                {/* 搜尋模式：結果列表 */}
                {isSearching ? (
                    <div className="space-y-4">
                        {searchResults.length === 0 ? (
                            <div className="text-center py-16 space-y-2">
                                <p className="text-xs text-[#D1C4B9] tracking-widest">沒有符合的紀錄</p>
                                <p className="text-[10px] text-[#D1C4B9]">試試其他關鍵字，或取消類型篩選</p>
                            </div>
                        ) : (
                            searchResults.map(r => {
                                const kw = searchKeyword.trim().toLowerCase();
                                const typeLabel = { body: '身體覺察', mood: '心情能量', diary: '日記隨想' }[r.type];
                                const typeColor = { body: '#C8A882', mood: '#B8A0C8', diary: '#A0B8C8' }[r.type];
                                // 摘要文字
                                let summary = '';
                                let snippets = [];
                                if (r.type === 'body') {
                                    summary = [r.area, (r.side||[]).filter(s=>s!=='不分').join(''), r.part].filter(Boolean).join(' · ');
                                    snippets = (r.sensationData||[]).map(s=>`${s.label} ${s.intensity}%`);
                                } else if (r.type === 'mood') {
                                    summary = Object.entries(r.moods||{}).slice(0,3).map(([k,v])=>`${k} ${v}%`).join('・');
                                } else if (r.type === 'diary') {
                                    const df = r.diaryFields || {};
                                    const cl = r.customLabels || {};
                                    const BUILT_IN = { f1:'夢境故事', f2:'飲食情況', f3:'對自己的新發現', f4:'內在呼喚', f5:'溫柔回應', f6:'最深刻的事', f7:'幸運的事', f8:'今日的加分行為' };
                                    const filledEntries = Object.entries(df).filter(([,v])=>v?.trim());
                                    if (filledEntries.length > 0) {
                                        const [k0, v0] = filledEntries[0];
                                        summary = BUILT_IN[k0] || cl[k0] || k0;
                                        snippets = [v0.slice(0, 60) + (v0.length > 60 ? '…' : '')];
                                    }
                                }
                                // 找出符合關鍵字的欄位作為命中片段
                                const hitFields = [];
                                if (kw) {
                                    const checks = [
                                        { label: null, val: summary },
                                        ...(r.bodyLanguage ? [{ label: '身體想告訴我', val: r.bodyLanguage }] : []),
                                        ...(r.trueFeeling ? [{ label: '真實感受', val: r.trueFeeling }] : []),
                                        ...(r.timingBefore ? [{ label: '不適出現前', val: r.timingBefore }] : []),
                                        ...(r.timingDuring ? [{ label: '不適發生時', val: r.timingDuring }] : []),
                                        ...(r.timingAfter ? [{ label: '預期事件', val: r.timingAfter }] : []),
                                        ...(r.type === 'diary' ? Object.entries(r.diaryFields || {}).filter(([,v])=>v?.trim()).map(([k,v]) => ({ label: ({ f1:'夢境故事', f2:'飲食情況', f3:'對自己的新發現', f4:'內在呼喚', f5:'溫柔回應', f6:'最深刻的事', f7:'幸運的事', f8:'今日的加分行為' })[k] || (r.customLabels||{})[k] || k, val: v })) : []),
                                    ];
                                    checks.forEach(({ label, val }) => {
                                        if (val && val.toLowerCase().includes(kw)) {
                                            hitFields.push({ label, val });
                                        }
                                    });
                                }
                                return (
                                    <div key={r.id} onClick={() => onDetail(r)}
                                        className="p-5 border border-[#F3E5D8] rounded-[2rem] bg-white cursor-pointer active:bg-[#FAF7F4] transition-all space-y-2.5">
                                        <div className="flex items-center justify-between gap-2">
                                            <span className="text-[10px] font-medium tracking-widest" style={{color: typeColor}}>{typeLabel}</span>
                                            <span className="text-[10px] text-[#D1C4B9] tracking-widest">{r.date} · {r.timeSlot}</span>
                                        </div>
                                        {summary && (
                                            <p className="text-sm font-medium text-[#C8A882] tracking-wide leading-snug">
                                                {highlight(summary)}
                                            </p>
                                        )}
                                        {snippets.length > 0 && (
                                            <div className="flex flex-wrap gap-1.5">
                                                {snippets.slice(0,4).map((s, i) => (
                                                    <span key={i} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{highlight(s)}</span>
                                                ))}
                                            </div>
                                        )}
                                        {hitFields.filter(f => f.label !== null).map((f, i) => (
                                            <p key={i} className="text-xs text-[#8D7B6D] leading-relaxed border-t border-[#F3E5D8] pt-2 first:border-0 first:pt-0">
                                                {f.label && <span className="text-[#A89080] font-medium">{f.label}：</span>}
                                                <span className="font-light">{highlight(f.val.slice(0, 80) + (f.val.length > 80 ? '…' : ''))}</span>
                                            </p>
                                        ))}
                                    </div>
                                );
                            })
                        )}
                    </div>
                ) : (
                <>

                {/* 月曆 */}
                <div className="grid grid-cols-7 gap-2">
                    {['日','一','二','三','四','五','六'].map(d => (
                        <div key={d} className="flex items-center justify-center text-[10px] font-medium text-[#D1C4B9] tracking-widest py-1">{d}</div>
                    ))}
                    {Array.from({length: new Date(parseInt(monthPrefix.slice(0,4)), parseInt(monthPrefix.slice(5,7))-1, 1).getDay()}, (_, i) => (
                        <div key={`pad-${i}`} />
                    ))}
                    {Array.from({length: daysInMonth}, (_, i) => {
                        const ds = `${monthPrefix}-${String(i+1).padStart(2, '0')}`;
                        const has = records.some(r => r.date === ds && r.type !== 'diary');
                        const isToday = ds === today;
                        const isSelected = ds === selectedDate;
                        return (
                            <button key={i} onClick={() => { setSelectedDate(ds); setExpId(null); }} className={`aspect-square rounded-xl flex items-center justify-center text-[13px] font-medium transition-all
                                ${isSelected && !isToday ? 'border-2 border-[#C8A882] text-[#C8A882]' : ''}
                                ${isToday && isSelected ? 'bg-[#C8A882] text-white ring-2 ring-[#C8A882] ring-offset-1' : ''}
                                ${isToday && !isSelected ? 'bg-[#C8A882] text-white' : ''}
                                ${!isToday && !isSelected && has ? 'bg-[#F3E5D8] text-[#C8A882]' : ''}
                                ${!isToday && !isSelected && !has ? 'bg-[#F3E5D8]/20 text-[#A89080] border border-[#F3E5D8]' : ''}
                            `}>{i + 1}</button>
                        );
                    })}
                </div>

                {/* 日期標題 */}
                <h3 className="text-xs font-medium text-[#C8A882] tracking-[0.2em] border-b border-[#F3E5D8] pb-2 text-center">今日記事．溫柔回應</h3>

                {/* 當日紀錄 */}
                <div className="space-y-6">
                    {filtered.length === 0 && (
                        <p className="text-center py-16 text-xs text-[#D1C4B9] uppercase font-medium tracking-widest animate-fade-in">Gently Left Blank.</p>
                    )}
                    {filtered.map(r => (
                        <div key={r.id} className="p-6 border border-[#F3E5D8] rounded-[2rem] bg-white cursor-pointer space-y-3">
                            {/* 標題列：症狀 + 新增回應按鈕 */}
                            <div className="flex justify-between items-start gap-3">
                                <div className="space-y-1 min-w-0 flex-1" onClick={() => onDetail(r)}>
                                    <span className="text-xs font-medium text-[#D1C4B9] uppercase tracking-widest">{r.timeSlot}</span>
                                    {r.type === 'body' ? (
                                        <div className="space-y-2 mt-1">
                                            <p className="text-sm font-medium text-[#C8A882] tracking-wide">{bodyLabel(r)}</p>
                                            {(r.sensationData||[]).length > 0 && (
                                                <div className="flex flex-wrap gap-1.5 pt-2 border-t border-[#F3E5D8]">
                                                    {(r.sensationData||[]).map((s,i) => (
                                                        <span key={i} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{s.label} {s.intensity}%</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ) : r.type === 'mood' ? (
                                        <div className="space-y-2 mt-1">
                                            <p className="text-sm font-medium text-[#C8A882] tracking-wide">{Object.keys(r.moods||{}).slice(0,2).join(' · ')}{Object.keys(r.moods||{}).length > 2 ? ' ...' : ''}</p>
                                            <div className="flex flex-wrap gap-1.5 pt-2 border-t border-[#F3E5D8]">
                                                {Object.entries(r.moods||{}).map(([m,v]) => (
                                                    <span key={m} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{m} {v}%</span>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-2 mt-1">
                                            <p className="text-sm font-medium text-[#C8A882] tracking-wide">日記隨想</p>
                                            {r.diaryFields && Object.entries(r.diaryFields).filter(([,v])=>v?.trim()).map(([k,v]) => {
                                                const BL = {f1:'夢境故事',f2:'飲食情況',f3:'對自己的新發現',f4:'內在呼喚',f5:'溫柔回應',f6:'最深刻的事',f7:'幸運的事',f8:'今日的加分行為'};
                                                const label = BL[k] || (r.customLabels||{})[k] || k;
                                                return <p key={k} className="text-xs text-[#8D7B6D] leading-relaxed"><span className="text-[#A89080] font-medium">{label}：</span>{v}</p>;
                                            })}
                                        </div>
                                    )}
                                </div>
                                {r.type !== 'diary' && <button onClick={() => setExpId(expId === r.id ? null : r.id)} className="text-xs font-medium text-white bg-[#C8A882] px-4 py-1.5 rounded-full tracking-widest transition-transform active:scale-95 shrink-0 whitespace-nowrap mt-1">+ 回應</button>}
                                {r.type === 'diary' && (
                                    <button onClick={() => setDiaryLinkId(diaryLinkId === r.id ? null : r.id)} className="text-xs font-medium text-[#C8A882] border border-[#C8A882]/40 px-4 py-1.5 rounded-full tracking-widest transition-transform active:scale-95 shrink-0 whitespace-nowrap mt-1">串聯</button>
                                )}
                            </div>
                            {(r.trueFeeling || r.bodyLanguage) && (
                                <div className="pt-1 border-t border-[#F3E5D8] space-y-1">
                                    {r.trueFeeling && <p className="text-xs leading-relaxed"><span className="text-[#A89080] font-medium">真實感受 · </span><span className="font-light text-[#8D7B6D] whitespace-pre-wrap">{r.trueFeeling}</span></p>}
                                    {r.bodyLanguage && <p className="text-xs leading-relaxed"><span className="text-[#A89080] font-medium">身體想告訴我 · </span><span className="font-light text-[#8D7B6D] whitespace-pre-wrap">{r.bodyLanguage}</span></p>}
                                </div>
                            )}
                            {(r.timingBefore||r.timingDuring||r.timingAfter) && (
                                <div className="pt-1 border-t border-[#F3E5D8] space-y-1">
                                    {r.timingBefore && <p className="text-xs leading-relaxed line-clamp-1"><span className="text-[#A89080] font-medium">不適出現前 · </span><span className="font-light text-[#8D7B6D] whitespace-pre-wrap">{r.timingBefore}</span></p>}
                                    {r.timingDuring && <p className="text-xs leading-relaxed line-clamp-1"><span className="text-[#A89080] font-medium">不適發生時 · </span><span className="font-light text-[#8D7B6D] whitespace-pre-wrap">{r.timingDuring}</span></p>}
                                    {r.timingAfter && <p className="text-xs leading-relaxed line-clamp-1"><span className="text-[#A89080] font-medium">預期事件 · </span><span className="font-light text-[#8D7B6D] whitespace-pre-wrap">{r.timingAfter}</span></p>}
                                </div>
                            )}
                            {/* 日記串聯展開選項 */}
                            {r.type === 'diary' && diaryLinkId === r.id && (() => {
                                const linkable = records.filter(x => (x.type === 'body' || x.type === 'mood') && x.id !== r.id).sort((a,b) => new Date(b.date)-new Date(a.date));
                                const currentLinks = r.links || [];
                                const toggleDiaryLink = (linkId) => {
                                    const updated = currentLinks.includes(linkId)
                                        ? currentLinks.filter(x => x !== linkId)
                                        : [...currentLinks, linkId];
                                    setRecords(prev => prev.map(x => x.id === r.id ? {...x, links: updated} : x));
                                };
                                return (
                                    <div className="pt-3 border-t border-dashed border-[#F3E5D8] space-y-2 animate-fade-in">
                                        <p className="text-xs text-[#D1C4B9] tracking-wide">選擇與這筆日記相關的身體或心情紀錄</p>
                                        {linkable.length === 0
                                            ? <p className="text-xs text-[#D1C4B9] text-center py-3">尚無可串聯的紀錄</p>
                                            : <div className="space-y-2 max-h-48 overflow-y-auto">
                                                {linkable.map(x => {
                                                    const linked = currentLinks.includes(x.id);
                                                    const sum = x.type === 'body'
                                                        ? `${[x.area, x.part].filter(Boolean).join(' ')}${(x.sensationData||[]).length ? ' · ' + x.sensationData.slice(0,2).map(s=>s.label).join('、') : ''}`
                                                        : Object.keys(x.moods||{}).slice(0,3).join('、') || '心情記錄';
                                                    return (
                                                        <button key={x.id} onClick={() => toggleDiaryLink(x.id)}
                                                            className={"w-full flex items-center justify-between px-3 py-2.5 rounded-xl border text-left transition-all " + (linked ? 'bg-[#C8A882]/10 border-[#C8A882]' : 'bg-white border-[#F3E5D8]')}>
                                                            <div>
                                                                <p className={"text-xs font-medium " + (linked ? 'text-[#C8A882]' : 'text-[#8D7B6D]')}>{sum}</p>
                                                                <p className="text-[10px] text-[#D1C4B9] mt-0.5">{x.date} · {x.timeSlot}</p>
                                                            </div>
                                                            {linked && <svg className="w-3 h-3 text-[#C8A882] shrink-0" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" d="M6 8h4M3.5 5.5A2.5 2.5 0 016 8a2.5 2.5 0 01-2.5 2.5M12.5 5.5A2.5 2.5 0 0110 8a2.5 2.5 0 002.5 2.5" /></svg>}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        }
                                        <button onClick={() => setDiaryLinkId(null)} className="w-full text-xs text-[#A89080] font-medium tracking-widest pt-1">完成</button>
                                    </div>
                                );
                            })()}
                            {r.links && r.links.length > 0 && (
                                <div className="pt-1 border-t border-[#F3E5D8] space-y-1">
                                    {r.links.map(id => {
                                        const lr = records.find(x => x.id === id);
                                        if (!lr) return null;
                                        const lrSummary = lr.type === 'body'
                                            ? `${[lr.area, (lr.side||[]).filter(s=>s!=='不分').join(' '), lr.part].filter(Boolean).join(' ')}${(lr.sensationData||[]).length ? ' · ' + lr.sensationData.slice(0,2).map(s=>s.label+(s.intensity?` ${s.intensity}%`:'')).join('、') : ''}`
                                            : lr.type === 'mood'
                                            ? Object.entries(lr.moods||{}).slice(0,3).map(([k,v])=>`${k} ${v}%`).join('、')
                                            : '日記';
                                        return (
                                            <p key={id} className="text-xs flex items-start gap-1.5">
                                                <svg className="w-3 h-3 inline-block shrink-0 mt-0.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" d="M6 8h4M3.5 5.5A2.5 2.5 0 016 8a2.5 2.5 0 01-2.5 2.5M12.5 5.5A2.5 2.5 0 0110 8a2.5 2.5 0 002.5 2.5" /></svg>
                                                <span><span className="font-medium text-[#A89080]">已串聯 · </span><span className="font-light text-[#8D7B6D]">{lrSummary}</span></span>
                                            </p>
                                        );
                                    })}
                                </div>
                            )}

                            {/* 回應清單 */}
                            {(r.lab || []).length > 0 && (
                                <div className="pt-2 border-t border-[#F3E5D8] space-y-3">
                                    {(r.lab || []).map(l => (
                                        <div key={l.id} className="p-4 bg-[#F3E5D8]/30 rounded-[1.5rem] border border-[#F3E5D8] space-y-2 animate-fade-in">
                                            <div className="flex justify-between items-start gap-2">
                                                <div className="space-y-1 flex-1">
                                                    <p className="text-xs font-medium text-[#A89080] tracking-wide">回應方式</p>
                                                    <p className="text-sm font-light text-[#8D7B6D] leading-relaxed whitespace-pre-wrap">{l.action}</p>
                                                </div>
                                                <div className="flex gap-2 shrink-0">
                                                    <button onClick={() => { setEditLabId({recordId:r.id,labId:l.id}); setEditLabText(l.action); setEditLabEffect(l.effect || 0); }} className="text-xs text-[#C8A882] underline px-2 py-0.5 shrink-0">編輯</button>
                                                    <button onClick={() => deleteLab(r.id, l.id)} className="text-xs text-[#D1C4B9] px-2 py-0.5">✕</button>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`text-xs font-medium px-3 py-1 rounded-full ${l.effect === 0 ? 'bg-[#F3E5D8]/60 text-[#D1C4B9]' : l.effect > 0 ? 'bg-[#C8A882]/15 text-[#C8A882]' : 'bg-[#A89080]/10 text-[#A89080]'}`}>
                                                    {l.effect > 0 ? '+' : ''}{l.effect * 10}%
                                                </span>
                                                <span className="text-xs text-[#A89080]">{l.effect === 0 ? '沒什麼感覺' : l.effect > 0 ? '有幫助' : '沒幫助'}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* 新增對策表單 */}
                            {editLabId && editLabId.recordId === r.id && (
                                <div className="pt-2 border-t border-[#F3E5D8] space-y-2 animate-fade-in">
                                    <p className="text-xs text-[#A89080] tracking-wide font-medium">編輯回應</p>
                                    <textarea value={editLabText} onChange={e => setEditLabText(e.target.value)}
                                        className="w-full bg-[#FAF7F4] p-4 rounded-2xl text-sm outline-none border border-[#F3E5D8] h-20 leading-relaxed text-[#8D7B6D] placeholder-[#D1C4B9]" />
                                    <div className="space-y-1.5">
                                        <p className="text-xs text-[#A89080] font-medium">回應後的程度</p>
                                        <div className="flex gap-2">
                                            <div className="flex items-center gap-2 text-[10px] text-[#D1C4B9]">
                                                <span>負面</span>
                                                <input type="range" min="-10" max="10" step="1" className="flex-1"
                                                    value={editLabEffect}
                                                    onChange={e => setEditLabEffect(parseInt(e.target.value))} />
                                                <span>正面</span>
                                            </div>
                                            <p className="text-xs text-center text-[#C8A882] font-medium">{editLabEffect > 0 ? '+' : ''}{editLabEffect * 10}%</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 justify-end">
                                        <button onClick={() => setEditLabId(null)} className="text-xs text-[#D1C4B9] px-3 py-1.5">取消</button>
                                        <button onClick={() => {
                                            if (!editLabText.trim()) return;
                                            setRecords(records.map(rec => rec.id !== editLabId.recordId ? rec : {...rec, lab: (rec.lab||[]).map(l => l.id !== editLabId.labId ? l : {...l, action: editLabText.trim(), effect: editLabEffect})}));
                                            setEditLabId(null);
                                        }} className="text-xs text-white bg-[#C8A882] px-3 py-1.5 rounded-full">儲存</button>
                                    </div>
                                </div>
                            )}
                            {expId === r.id && (
                                <div className="pt-4 border-t border-dashed border-[#F3E5D8] space-y-4 animate-fade-in">
                                    <textarea
                                        value={newLab.action}
                                        onChange={e => setNewLab({...newLab, action: e.target.value})}
                                        placeholder="記下你如何回應這個狀態，如：吃宵夜、去運動、多睡覺、吃藥..."
                                        className="w-full bg-[#F3E5D8]/30 p-5 rounded-2xl text-sm outline-none h-24 placeholder-[#C8A882]/40 font-medium border border-[#D1C4B9]"
                                    />
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-medium text-[#C8A882] uppercase tracking-widest"><span>回應成效</span><span style={{color: newLab.effect < 0 ? '#A89080' : '#C8A882'}}>{newLab.effect * 10}%</span></div>
                                        <div className="flex items-center gap-2 text-[10px] text-[#D1C4B9]"><span>負面</span><input type="range" min="-10" max="10" step="1" className="flex-1" value={newLab.effect} onChange={e => setNewLab({...newLab, effect: parseInt(e.target.value)})} /><span>正面</span></div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setExpId(null)} className="flex-1 text-xs text-[#A89080] font-medium uppercase tracking-widest">取消</button>
                                        <button onClick={() => saveLab(r.id)} disabled={!newLab.action.trim()} className="flex-[2.5] py-4 bg-[#C8A882] text-white rounded-2xl text-xs font-medium tracking-[0.2em] transition-transform active:scale-95 disabled:opacity-30 uppercase">儲存回應</button>
                                    </div>
                                </div>
                            )}
                        {(r.type === 'body' || r.type === 'mood') && !(r.timingBefore && r.timingDuring && r.timingAfter && r.bodyLanguage && r.trueFeeling) && (
                                <div className="pt-2 flex justify-end" onClick={e => e.stopPropagation()}>
                                    <button onClick={() => onSupplement(r)}
                                        className="text-xs text-[#C8A882] border border-[#F3E5D8] rounded-full px-4 py-1.5 font-medium tracking-widest transition-transform active:scale-95">
                                        + 補充
                                    </button>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
                </>
                )}
            </div>
        );
    }

        const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
