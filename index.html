    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        :root {
            --ancient-gold: #C8A882;
            --light-beige: #D1C4B9;
            --white: #FFFFFF;
            --danger-muted: #8D7B6D;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8f8f8; 
            color: var(--ancient-gold); 
            font-weight: 300;
            margin: 0;
            padding: 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="range"] { accent-color: var(--ancient-gold); }
        input[type="date"] { border: none; background: transparent; font-family: inherit; color: var(--ancient-gold); text-align: center; font-size: 1.1rem; font-weight: 500; outline: none; width: 100%; }
        
        .app-container {
            width: 100%;
            max-width: 430px;
            background-color: var(--white);
            min-height: 100vh;
            position: relative;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #F3E5D8;
            border-right: 1px solid #F3E5D8;
            box-sizing: border-box;
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .record-modal { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        * { box-shadow: none !important; -webkit-tap-highlight-color: transparent; }
        @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

  if ('serviceWorker' in navigator) {

    // ── 標籤庫 helpers ────────────────────────────────────────────
    const TAG_STORAGE = {
        body:   'bp_tags_body',
        mood:   'bp_tags_mood',
        timing: 'bp_tags_timing',
        diary:  'bp_tags_diary',
    };

    const DEFAULT_TIMING_TAGS = {
        before: ['久坐', '熬夜', '空腹', '飯後', '運動後', '壓力大', '月經結束', '睡眠不足'],
        during: ['工作中', '開會時', '如廁時', '睡眠中', '走路時', '用餐時', '久站後', '月經期間', '壓力大'],
        after:  ['重要會議', '考試', '出差', '比賽', '上台', '就醫', '長途旅行'],
    };

    function loadTags(type) {
        try {
            const raw = localStorage.getItem(TAG_STORAGE[type]);
            return raw ? JSON.parse(raw) : null;
        } catch(e) { return null; }
    }
    function saveTags(type, data) {
        localStorage.setItem(TAG_STORAGE[type], JSON.stringify(data));
    }
    function getTimingTags() {
        return loadTags('timing') || JSON.parse(JSON.stringify(DEFAULT_TIMING_TAGS));
    }
    function getBodyCustomTags() {
        return loadTags('body') || [];
    }
    function getMoodCustomTags() {
        return loadTags('mood') || [];
    }
    function getDiaryCustomTitles() {
        return loadTags('diary') || [];
    }
    function saveDiaryCustomTitle(label) {
        const current = getDiaryCustomTitles();
        if (!current.includes(label)) {
            saveTags('diary', [...current, label]);
        }
    }
    // ──────────────────────────────────────────────────────────────

    function SavedModal({ justSaved, onSupplement, onClose }) {
        if (!justSaved) return null;
        return (
            <div className="fixed inset-0 z-[200] flex items-center justify-center px-8"
                 style={{background:'rgba(250,247,244,0.85)', backdropFilter:'blur(4px)'}}>
                <div className="bg-white rounded-[2rem] shadow-xl border border-[#F3E5D8] px-10 py-10 flex flex-col items-center gap-6 w-full max-w-xs"
                     style={{animation:'slideUp 0.3s ease'}}>
                    <div className="flex flex-col items-center gap-3">
                        <span className="text-3xl text-[#C8A882]">✓</span>
                        <p className="text-base font-medium text-[#8D7B6D] tracking-widest">已儲存</p>
                    </div>
                    <button onClick={onClose}
                        className="w-full py-3 rounded-full border border-[#F3E5D8] text-sm text-[#A89080] font-medium tracking-widest">
                        關閉
                    </button>
                    <button onClick={onSupplement}
                        className="text-xs text-[#A89080] underline underline-offset-4 decoration-[#D1C4B9]">
                        記下發生時機與自我對話
                    </button>
                </div>
            </div>
        );
    }

    // Helper: timing slot custom input
    function TimingCustomInput({ placeholder, onAdd, selectedTags, onToggle }) {
        const [val, setVal] = React.useState('');
        return (
            <div className="flex gap-2 mt-1">
                <input value={val} onChange={e => setVal(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter' && val.trim()) { onAdd(val.trim()); setVal(''); } }}
                    placeholder={placeholder}
                    className="flex-1 bg-transparent text-xs outline-none border-b border-[#F3E5D8] text-[#8D7B6D] placeholder-[#D1C4B9] py-1.5" />
                {val.trim() && (
                    <button onClick={() => { onAdd(val.trim()); setVal(''); }}
                        className="text-xs text-white bg-[#C8A882] px-3 py-1 rounded-full">確認</button>
                )}
            </div>
        );
    }

    function SupplementPage({ record, records = [], onSave, onClose }) {
        const hasTiming = !!(record.timingBefore || record.timingDuring || record.timingAfter);
        const hasFeeling = !!record.trueFeeling;
        const hasBody = !!record.bodyLanguage;

        const [selected, setSelected] = React.useState([]);
        const [timingBefore, setTimingBefore] = React.useState(record.timingBefore || '');
        const [timingDuring, setTimingDuring] = React.useState(record.timingDuring || '');
        const [timingAfter, setTimingAfter] = React.useState(record.timingAfter || '');
        const [bodyLanguage, setBodyLanguage] = React.useState(record.bodyLanguage || '');
        const [trueFeeling, setTrueFeeling] = React.useState(record.trueFeeling || '');
        const [linkedIds, setLinkedIds] = React.useState(record.links || []);

        const toggle = (key) => setSelected(s => s.includes(key) ? s.filter(k => k !== key) : [...s, key]);

        // 可關聯的紀錄：相反類型（body↔mood），排除自己

        function TagManagerPage({ onClose }) {
    const [tab, setTab] = React.useState('body');
    const [bodyTags, setBodyTagsState] = React.useState(() => getBodyCustomTags());
    const [moodTags, setMoodTagsState] = React.useState(() => getMoodCustomTags());
    const [timingTags, setTimingTagsState] = React.useState(() => getTimingTags());
    const [diaryTitles, setDiaryTitlesState] = React.useState(() => getDiaryCustomTitles());
    const [editingTag, setEditingTag] = React.useState(null);
    const [newInput, setNewInput] = React.useState('');

    const saveBody = (tags) => { setBodyTagsState(tags); saveTags('body', tags); };
    const saveMood = (tags) => { setMoodTagsState(tags); saveTags('mood', tags); };
    const saveTiming = (tt) => { setTimingTagsState(tt); saveTags('timing', tt); };
    const saveDiary = (tags) => { setDiaryTitlesState(tags); saveTags('diary', tags); };

    const deleteTag = (type, slot, idx, tagName) => {
        if (!window.confirm(`確定要刪除「${tagName}」嗎？`)) return;
        if (type === 'body') { const t = [...bodyTags]; t.splice(idx, 1); saveBody(t); }
        else if (type === 'mood') { const t = [...moodTags]; t.splice(idx, 1); saveMood(t); }
        else if (type === 'diary') { const t = [...diaryTitles]; t.splice(idx, 1); saveDiary(t); }
        else { const tt = {...timingTags, [slot]: timingTags[slot].filter((_,i)=>i!==idx) }; saveTiming(tt); }
    };
    const renameTag = (type, slot, idx, newVal) => {
        if (!newVal.trim()) return;
        if (type === 'body') { const t = [...bodyTags]; t[idx] = newVal.trim(); saveBody(t); }
        else if (type === 'mood') { const t = [...moodTags]; t[idx] = newVal.trim(); saveMood(t); }
        else if (type === 'diary') { const t = [...diaryTitles]; t[idx] = newVal.trim(); saveDiary(t); }
        else { const sl = [...timingTags[slot]]; sl[idx] = newVal.trim(); saveTiming({...timingTags, [slot]: sl}); }
        setEditingTag(null);
    };
    const addTag = (type, slot) => {
        if (!newInput.trim()) return;
        const v = newInput.trim();
        if (type === 'body' && !bodyTags.includes(v)) saveBody([...bodyTags, v]);
        else if (type === 'mood' && !moodTags.includes(v)) saveMood([...moodTags, v]);
        else if (type === 'diary' && !diaryTitles.includes(v)) saveDiary([...diaryTitles, v]);
        else if (type === 'timing' && !timingTags[slot].includes(v)) saveTiming({...timingTags, [slot]: [...timingTags[slot], v]});
        setNewInput('');
    };

    const renderTagList = (tags, type, slot) => {
        return (
            <div className="space-y-2">
                {tags.length === 0 && <p className="text-xs text-[#D1C4B9] text-center py-4">尚無標籤</p>}
                {tags.map((tag, idx) => (
                    <div key={idx} className="flex items-center gap-3 px-4 py-3 border border-[#F3E5D8] rounded-2xl bg-white">
                        {editingTag && editingTag.type === type && editingTag.slot === slot && editingTag.index === idx ? (
                            <>
                                <input value={editingTag.value}
                                    onChange={e => setEditingTag({...editingTag, value: e.target.value})}
                                    onKeyDown={e => { if(e.key==='Enter') renameTag(type, slot, idx, editingTag.value); if(e.key==='Escape') setEditingTag(null); }}
                                    className="flex-1 text-sm outline-none text-[#8D7B6D] bg-transparent border-b border-[#C8A882]" />
                                <button onClick={() => renameTag(type, slot, idx, editingTag.value)} className="text-xs text-white bg-[#C8A882] px-3 py-1 rounded-full">儲存</button>
                                <button onClick={() => setEditingTag(null)} className="text-xs text-[#A89080]">取消</button>
                            </>
                        ) : (
                            <>
                                <span className="flex-1 text-sm text-[#8D7B6D]">{tag}</span>
                                <button onClick={() => setEditingTag({ type, slot, index: idx, value: tag })} className="text-xs text-[#A89080] px-2">改名</button>
                                <button onClick={() => deleteTag(type, slot, idx, tag)} className="text-xs text-[#D1C4B9] px-1">✕</button>
                            </>
                        )}
                    </div>
                ))}
                <div className="flex gap-2 pt-1">
                    <input value={newInput} onChange={e => setNewInput(e.target.value)}
                        onKeyDown={e => { if(e.key==='Enter') addTag(type, slot); }}
                        placeholder="新增標籤..."
                        className="flex-1 text-sm outline-none border-b border-[#F3E5D8] text-[#8D7B6D] placeholder-[#D1C4B9] py-1.5 bg-transparent" />
                    {newInput.trim() && <button onClick={() => addTag(type, slot)} className="text-xs text-white bg-[#C8A882] px-3 py-1.5 rounded-full">新增</button>}
                </div>
            </div>
        );
    };

    const TIMING_SLOTS = [
        { key: 'before', label: '不適出現前' },
        { key: 'during', label: '不適發生時' },
        { key: 'after',  label: '預期事件' },
    ];

    return (
        <div className="fixed inset-0 z-[300] bg-white flex flex-col max-w-[428px] mx-auto">
            <div className="flex items-center justify-between px-8 pt-12 pb-4 border-b border-[#F3E5D8]">
                <h2 className="text-lg font-light text-[#C8A882] tracking-[0.2em]">標籤管理</h2>
                <button onClick={onClose} className="text-[#A89080] text-xl">✕</button>
            </div>
            <div className="flex gap-2 px-8 py-4 border-b border-[#F3E5D8] flex-wrap">
                {[['body','身體感受'],['mood','心情'],['timing','情境脈絡'],['diary','日記標題']].map(([key,label]) => (
                    <button key={key} onClick={() => { setTab(key); setNewInput(''); setEditingTag(null); }}
                        className={"px-4 py-1.5 rounded-full text-xs font-medium tracking-widest transition-all " + (tab===key ? 'bg-[#C8A882] text-white' : 'border border-[#F3E5D8] text-[#A89080]')}>
                        {label}
                    </button>
                ))}
            </div>
            <div className="flex-1 overflow-y-auto px-8 py-6 space-y-4">
                {tab === 'body' && renderTagList(bodyTags, 'body', null)}
                {tab === 'mood' && renderTagList(moodTags, 'mood', null)}
                {tab === 'diary' && (
                    <div className="space-y-3">
                        <p className="text-xs text-[#D1C4B9] tracking-widest text-center pb-1">在日記新增過的自訂標題，下次可快速套用</p>
                        {renderTagList(diaryTitles, 'diary', null)}
                    </div>
                )}
                {tab === 'timing' && TIMING_SLOTS.map(({ key, label }) => (
                    <div key={key} className="space-y-3">
                        <p className="text-xs font-medium text-[#C8A882] tracking-widest">{label}</p>
                        {renderTagList(timingTags[key] || [], 'timing', key)}
                    </div>
                ))}
            </div>
        </div>
    );
}


    function App() {
        const [tab, setTab] = useState('home');
        const [prevTab, setPrevTab] = useState('home');
        const [records, setRecords] = useState(JSON.parse(localStorage.getItem('bp_v25_all') || '[]'));
        const [selectedDetail, setSelectedDetail] = useState(null);
        const [detailClickY, setDetailClickY] = useState(null);
        const [justSaved, setJustSaved] = useState(null); // { id, type } for post-save toast
        const [supplementRecord, setSupplementRecord] = useState(null); // record open in SupplementPage

        const switchTab = (newTab) => {
            setPrevTab(tab);
            setTab(newTab);
        };

        useEffect(() => {
            const main = document.querySelector('main');
            if (main) main.scrollTop = 0;
        }, [tab]);

        const openDetail = (record, e) => {
            if (e) {
                const container = document.querySelector('.app-container');
                const rect = container ? container.getBoundingClientRect() : { top: 0, height: window.innerHeight };
                const relY = ((e.clientY - rect.top) / rect.height) * 100;
                setDetailClickY(relY);
            }
            setSelectedDetail(record);
        };

        useEffect(() => { localStorage.setItem('bp_v25_all', JSON.stringify(records)); }, [records]);

        const addRecord = (r) => {
            const newId = Date.now();
            const newRecord = { ...r, id: newId };
            const newList = [newRecord, ...records];
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            // Show post-save toast for body/mood only
            if (r.type === 'body' || r.type === 'mood') {
                setJustSaved({ id: newId, record: newRecord });
            }
            // Go back to where we came from
            if (tab === 'body_rec') switchTab(prevTab === 'body' ? 'body' : 'home');
            else if (tab === 'mood_rec') switchTab(prevTab === 'mood' ? 'mood' : 'home');
            else if (tab === 'diary_rec') switchTab(prevTab === 'diary' ? 'diary' : 'home');
            else switchTab('home');
        };

        const updateRecord = (updatedR) => {
            const oldR = records.find(r => r.id === updatedR.id);
            const newLinkedIds = updatedR.links || [];
            const oldLinkedIds = oldR?.links || [];
            const added = newLinkedIds.filter(id => !oldLinkedIds.includes(id));
            const removed = oldLinkedIds.filter(id => !newLinkedIds.includes(id));
            let newList = records.map(r => {
                if (r.id === updatedR.id) return updatedR;
                if (added.includes(r.id)) {
                    const links = [...(r.links || [])];
                    if (!links.includes(updatedR.id)) links.push(updatedR.id);
                    return {...r, links};
                }
                if (removed.includes(r.id)) {
                    return {...r, links: (r.links || []).filter(id => id !== updatedR.id)};
                }
                return r;
            });
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            setSelectedDetail(null);
        };

        const saveSupplementRecord = (updatedR) => {
            const newLinkedIds = updatedR.links || [];
            const oldLinkedIds = supplementRecord?.links || [];
            // removed links
            const removed = oldLinkedIds.filter(id => !newLinkedIds.includes(id));
            // added links
            const added = newLinkedIds.filter(id => !oldLinkedIds.includes(id));

            let newList = records.map(r => {
                if (r.id === updatedR.id) return updatedR;
                // add back-link
                if (added.includes(r.id)) {
                    const links = [...(r.links || [])];
                    if (!links.includes(updatedR.id)) links.push(updatedR.id);
                    return {...r, links};
                }
                // remove back-link
                if (removed.includes(r.id)) {
                    return {...r, links: (r.links || []).filter(id => id !== updatedR.id)};
                }
                return r;
            });
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            setSupplementRecord(null);
        };

        const deleteRecord = (id) => {
            if(window.confirm("確定要刪除這筆覺察紀錄嗎？")) {
                setRecords(records.filter(r => r.id !== id));
                setSelectedDetail(null);
            }
        };

        return (
            <div className="flex justify-center min-h-screen bg-[#f8f8f8]">
                <div className="app-container shadow-2xl">
                    <main className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        {tab === 'home' && <HomePage switchTab={switchTab} records={records} onDetail={openDetail} />}
                        
                        {tab === 'body' && <CategoryLog records={records} type="body" onDetail={openDetail} onAdd={() => switchTab('body_rec')} onSupplement={(r) => setSupplementRecord(r)} />}
                        {tab === 'mood' && <CategoryLog records={records} type="mood" onDetail={openDetail} onAdd={() => switchTab('mood_rec')} onSupplement={(r) => setSupplementRecord(r)} />}
                        {tab === 'diary' && <CategoryLog records={records} type="diary" onDetail={openDetail} onAdd={() => switchTab('diary_rec')} />}
                        {tab === 'body_rec' && <BodyRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'body' ? 'body' : 'home')} savedCustomTags={getBodyCustomTags()} onAddCustom={(tag) => { const t = getBodyCustomTags(); if(!t.includes(tag)) saveTags('body',[...t,tag]); }} />}
                        {tab === 'mood_rec' && <MoodRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'mood' ? 'mood' : 'home')} savedCustomTags={getMoodCustomTags()} onAddCustom={(tag) => { const t = getMoodCustomTags(); if(!t.includes(tag)) saveTags('mood',[...t,tag]); }} />}
                        {tab === 'diary_rec' && <DiaryRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'diary' ? 'diary' : 'home')} />}
                        {tab === 'lab' && <MiniLab records={records} setRecords={setRecords} onDetail={openDetail} onSupplement={(r) => setSupplementRecord(r)} />}
                        
                        {tab === 'trend' && <TrendPage records={records} />}
                    </main>

                    <SavedModal
                        justSaved={justSaved}
                        onSupplement={() => {
                            if (justSaved) {
                                setSupplementRecord(justSaved.record);
                                setJustSaved(null);
                            }
                        }}
                        onClose={() => setJustSaved(null)}
                    />
                    {supplementRecord && (
                        <SupplementPage
                            record={supplementRecord}
                            records={records}
                            onSave={saveSupplementRecord}
                            onClose={() => setSupplementRecord(null)}
                        />
                    )}
                    {selectedDetail && <DetailModal record={selectedDetail} records={records} clickY={detailClickY} onClose={() => setSelectedDetail(null)} onUpdate={updateRecord} onDelete={deleteRecord} />}

                    <nav className="fixed bottom-0 w-full max-w-[428px] h-20 bg-white border-t border-[#F3E5D8] flex items-center justify-around px-2 z-50">
                        <NavBtn active={tab === 'home'} onClick={() => switchTab('home')} label="首頁" icon={<Icon.Home />} />
                        <NavBtn active={tab === 'body'} onClick={() => switchTab('body')} label="身體" icon={<Icon.Body />} />
                        <NavBtn active={tab === 'mood'} onClick={() => switchTab('mood')} label="心情" icon={<Icon.Mood />} />
                        <NavBtn active={tab === 'diary'} onClick={() => switchTab('diary')} label="日記" icon={<Icon.Diary />} />
                        <NavBtn active={tab === 'lab'} onClick={() => switchTab('lab')} label="調頻" icon={<Icon.Calendar />} />
                    </nav>
                </div>
            </div>
        );
    }

    function NavBtn({ icon, label, active, onClick }) {
        return (
            <button onClick={onClick} className={`flex flex-col items-center gap-1 flex-1 transition-all ${active ? 'opacity-100 scale-105 font-medium' : 'opacity-30'}`}>
                {icon}
                <span className="text-[10px] font-medium tracking-tighter text-[#C8A882]">{label}</span>
            </button>
        );
    }

    // 部位顯示格式
    function bodyLabel(r) {
        const side = (r.side || []).filter(s => s !== '不分').join(' ');
        const pos = (r.position || []).join(' ');
        const level = (r.level || []).join(' ');
        return [r.area, side || null, r.part, pos || null, level || null].filter(Boolean).join(' · ');
    }

    // --- 詳情 Modal ---
    function DetailModal({ record, records = [], onClose, onUpdate, onDelete, clickY }) {
        const [isEditing, setIsEditing] = useState(false);
        const [edited, setEdited] = useState({...record});
        const [moodEditNames, setMoodEditNames] = useState({});
        const cnType = record.type === 'body' ? '身體覺察' : record.type === 'mood' ? '心情能量' : '日記隨想';

        // 計算 modal 頂部位置：以點擊位置為起點，但確保不超出畫面
        const topPct = clickY ? Math.min(Math.max(clickY - 20, 5), 60) : 10;

        return (
            <div className="fixed inset-0 z-[100] animate-fade-in flex items-center justify-center px-6" onClick={onClose}>
                <div className="fixed inset-0 bg-[#C8A882]/10 backdrop-blur-sm" />
                <div
                    className="relative w-full bg-white rounded-[3rem] p-8 space-y-5 border border-[#F3E5D8] max-h-[85vh] overflow-y-auto no-scrollbar"
                    onClick={e => e.stopPropagation()}
                >
                    {/* Header: 日期時段 + 刪除編輯 同一行 */}
                    <div className="flex justify-between items-center pt-1">
                        <div className="flex items-baseline gap-2">
                            {isEditing ? (
                                <div className="space-y-2">
                                    <input type="date" className="block text-base font-medium" value={edited.date} onChange={e => setEdited({...edited, date: e.target.value})} />
                                    <div className="flex flex-wrap gap-1.5">
                                        {['凌晨','上午','下午','晚上','半夜'].map(slot => (
                                            <button key={slot} onClick={() => setEdited({...edited, timeSlot: slot})} className={`px-3 py-1 rounded-full text-xs font-medium border transition-all ${edited.timeSlot === slot ? 'bg-[#C8A882] text-white border-[#C8A882]' : 'text-[#C8A882] border-[#F3E5D8]'}`}>{slot}</button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <h2 className="text-lg font-medium text-[#D1C4B9] tracking-wide whitespace-nowrap">{record.date}</h2>
                                    <span className="text-xs text-[#D1C4B9] font-medium">{record.timeSlot}</span>
                                </>
                            )}
                        </div>
                        {!isEditing && (
                            <div className="flex items-center gap-2 shrink-0 ml-3">
                                <button onClick={() => onDelete(record.id)} className="px-3 py-1.5 bg-[#8D7B6D] text-white rounded-full text-xs font-medium tracking-wide">刪除</button>
                                <button onClick={() => setIsEditing(true)} className="px-3 py-1.5 border border-[#C8A882] rounded-full text-xs font-medium tracking-wide text-[#C8A882]">編輯</button>
                            </div>
                        )}
                    </div>

                    <div className="space-y-4">
                        {/* 身體覺察內容 */}
                        {record.type === 'body' && (
                            <div className="space-y-4">
                                <p className="text-lg font-medium text-[#8D7B6D] tracking-wide leading-snug">{(() => { const side = (edited.side||[]).filter(s=>s!=='不分').join(' '); const pos = (edited.position||[]).join(' '); const level = (edited.level||[]).join(' '); return [edited.area, side||null, record.part, pos||null, level||null].filter(Boolean).join(' · '); })()}</p>
                                <div className="space-y-2">
                                    {edited.sensationData.map((s, idx) => (
                                        <div key={idx} className="space-y-2 bg-[#FAF7F4] p-4 rounded-2xl border border-[#F3E5D8]">
                                            {isEditing ? (
                                                <div className="space-y-2">
                                                    <input value={s.label} onChange={e => { const nd = [...edited.sensationData]; nd[idx] = {...nd[idx], label: e.target.value}; setEdited({...edited, sensationData: nd}); }} className="w-full bg-white p-2 rounded-xl text-sm font-medium text-[#C8A882] border border-[#F3E5D8] outline-none focus:border-[#C8A882]" />
                                                    <div className="flex items-center gap-2">
                                                        <input type="range" className="flex-1" value={s.intensity} onChange={e => { const nd = [...edited.sensationData]; nd[idx] = {...nd[idx], intensity: parseInt(e.target.value)}; setEdited({...edited, sensationData: nd}); }} />
                                                        <span className="text-xs text-[#D1C4B9] w-10 text-right">{s.intensity}%</span>
                                                        <button onClick={() => setEdited({...edited, sensationData: edited.sensationData.filter((_,i) => i!==idx)})} className="text-xs text-[#A89080] px-2 py-1 rounded-full border border-[#F3E5D8]">✕</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex justify-between text-sm font-medium tracking-wide"><span className="text-[#C8A882]">{s.label}</span><span className="text-[#D1C4B9]">{s.intensity}%</span></div>
                                            )}
                                        </div>
                                    ))}
                                    {isEditing && (
                                        <button onClick={() => setEdited({...edited, sensationData: [...edited.sensationData, {label: '新感受', intensity: 50}]})} className="w-full py-2.5 text-xs text-[#C8A882] border border-dashed border-[#C8A882]/40 rounded-2xl tracking-wide">+ 新增感受</button>
                                    )}
                                </div>
                                <div className="border-t border-[#F3E5D8]"></div>
                            </div>
                        )}

                        {/* 心情能量內容 */}
                        {record.type === 'mood' && (
                            <div className="space-y-4">
                                <div className="space-y-2">
                                    {Object.entries(edited.moods).map(([m,v], idx) => (
                                        <div key={idx} className="space-y-2 bg-[#FAF7F4] p-4 rounded-2xl border border-[#F3E5D8]">
                                            {isEditing ? (
                                                <div className="space-y-2">
                                                    <input
                                                        value={moodEditNames[idx] !== undefined ? moodEditNames[idx] : m}
                                                        onChange={e => setMoodEditNames({...moodEditNames, [idx]: e.target.value})}
                                                        className="w-full bg-white p-2 rounded-xl text-sm font-medium text-[#C8A882] border border-[#F3E5D8] outline-none focus:border-[#C8A882]" />
                                                    <div className="flex items-center gap-2">
                                                        <input type="range" className="flex-1" value={v} onChange={e => {
                                                            const entries = Object.entries(edited.moods);
                                                            const newMoods = {};
                                                            entries.forEach(([k,val], i) => { newMoods[k] = i === idx ? parseInt(e.target.value) : val; });
                                                            setEdited({...edited, moods: newMoods});
                                                        }} />
                                                        <span className="text-xs text-[#D1C4B9] w-10 text-right">{v}%</span>
                                                        <button onClick={() => { const n = {...edited.moods}; delete n[m]; setEdited({...edited, moods: n}); }} className="text-xs text-[#A89080] px-2 py-1 rounded-full border border-[#F3E5D8]">✕</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex justify-between text-sm font-medium tracking-wide"><span className="text-[#C8A882]">{m}</span><span className="text-[#D1C4B9]">{v}%</span></div>
                                            )}
                                        </div>
                                    ))}
                                    {isEditing && (
                                        <button onClick={() => { const key = '新心情' + Date.now(); setEdited({...edited, moods: {...edited.moods, [key]: 50}}); }} className="w-full py-2.5 text-xs text-[#C8A882] border border-dashed border-[#C8A882]/40 rounded-2xl tracking-wide">+ 新增心情</button>
                                    )}
                                </div>
                                <div className="border-t border-[#F3E5D8]"></div>
                            </div>
                        )}

                        {/* 日記內容 */}
                        {record.type === 'diary' && (() => {
                            const BUILT_IN = { f1: '夢境故事', f2: '飲食情況', f3: '對自己的新發現', f4: '內在呼喚', f5: '溫柔回應', f6: '最深刻的事', f7: '幸運的事', f8: '今日的加分行為' };
                            const DIARY_PH = { f1: '記下今晚或最近做的夢，或是腦中浮現的畫面', f2: '記下今天吃了什麼，身體有什麼感受', f3: '記下過去未曾注意過的自己', f4: '記下今天想被幫忙的時刻', f5: '如果是你最重視的人需要你寫在上方的幫忙，你會如何回應', f6: '記下今天最讓你印象深刻的一件事', f7: '記下今天發生的一件幸運或美好的小事', f8: '記下今天做了什麼讓自己更好的事' };
                            const df = edited.diaryFields || record.diaryFields || {};
                            const customLabels = edited.customLabels || record.customLabels || {};
                            // collect all keys that have content, or all when editing
                            const allKeys = [...Object.keys(BUILT_IN), ...Object.keys(customLabels)];
                            const displayKeys = isEditing ? allKeys : allKeys.filter(k => df[k]?.trim());
                            // state for new custom field input in edit mode
                            const [editCustomInput, setEditCustomInput] = React.useState('');
                            const [editCustomContent, setEditCustomContent] = React.useState('');
                            const addCustomField = () => {
                                if (!editCustomInput.trim()) return;
                                const k = 'custom_' + Date.now();
                                setEdited({...edited,
                                    diaryFields: {...df, [k]: editCustomContent},
                                    customLabels: {...(edited.customLabels||record.customLabels||{}), [k]: editCustomInput.trim()}
                                });
                                setEditCustomInput('');
                                setEditCustomContent('');
                            };
                            return (
                                <div className="space-y-4">
                                    {/* f4+f5 shown as a pair if either appears */}
                                    {(() => {
                                        const rows = [];
                                        let skip = false;
                                        displayKeys.forEach(k => {
                                            if (skip) { skip = false; return; }
                                            if (k === 'f4') {
                                                const showF5 = displayKeys.includes('f5');
                                                rows.push(
                                                    <div key="f45" className="space-y-3">
                                                        <p className="text-sm font-medium text-[#A89080] tracking-wide">內在呼喚與溫柔回應</p>
                                                        {['f4','f5'].map(fk => (
                                                            <div key={fk} className="space-y-2">
                                                                <p className="text-xs font-medium text-[#D1C4B9] tracking-widest ml-1">{BUILT_IN[fk]}</p>
                                                                <div className="p-4 rounded-[1.5rem] border border-[#F3E5D8]">
                                                                    {isEditing
                                                                        ? <textarea value={df[fk]||''} onChange={e => setEdited({...edited, diaryFields: {...df, [fk]: e.target.value}})} placeholder={DIARY_PH[fk] || ''} className="w-full bg-transparent text-sm border-none outline-none text-[#8D7B6D] placeholder-[#D1C4B9] h-16 leading-relaxed resize-none" />
                                                                        : <p className="text-sm font-light text-[#8D7B6D] leading-relaxed whitespace-pre-wrap">{df[fk]}</p>
                                                                    }
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                );
                                                if (showF5) skip = true;
                                            } else if (k === 'f5' && displayKeys.includes('f4')) {
                                                // already handled in f4 block
                                            } else {
                                                const label = BUILT_IN[k] || customLabels[k] || k;
                                                rows.push(
                                                    <div key={k} className="space-y-2">
                                                        <p className="text-sm font-medium text-[#A89080] tracking-wide">{label}</p>
                                                        <div className="p-5 rounded-[1.5rem] border border-[#F3E5D8]">
                                                            {isEditing
                                                                ? <textarea value={df[k]||''} onChange={e => setEdited({...edited, diaryFields: {...df, [k]: e.target.value}})} placeholder={DIARY_PH[k] || '寫下你的想法...'} className="w-full bg-transparent text-sm border-none outline-none text-[#8D7B6D] placeholder-[#D1C4B9] h-20 leading-relaxed resize-none" />
                                                                : <p className="text-sm font-light text-[#8D7B6D] leading-relaxed whitespace-pre-wrap">{df[k]}</p>
                                                            }
                                                        </div>
                                                    </div>
                                                );
                                            }
                                        });
                                        return rows;
                                    })()}
                                    {/* 編輯模式：新增自訂標題 */}
                                    {isEditing && (
                                        editCustomInput !== '' ? (
                                            <div className="space-y-2 p-4 border border-dashed border-[#C8A882]/60 rounded-2xl animate-fade-in">
                                                <input value={editCustomInput} onChange={e => setEditCustomInput(e.target.value)}
                                                    placeholder="輸入標題名稱..."
                                                    className="w-full text-sm font-medium outline-none text-[#C8A882] bg-transparent border-b border-[#F3E5D8] pb-2 placeholder-[#C8A882]/40" />
                                                <textarea value={editCustomContent} onChange={e => setEditCustomContent(e.target.value)}
                                                    placeholder="寫下這個標題的內容..."
                                                    className="w-full text-sm outline-none bg-transparent text-[#8D7B6D] placeholder-[#D1C4B9] resize-none h-16 mt-1" />
                                                <div className="flex gap-2 justify-end pt-1">
                                                    <button onClick={() => { setEditCustomInput(''); setEditCustomContent(''); }} className="text-xs text-[#A89080]">取消</button>
                                                    <button onClick={addCustomField} disabled={!editCustomInput.trim()} className="text-xs text-white bg-[#C8A882] px-3 py-1 rounded-full disabled:opacity-40">確認新增</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <button onClick={() => setEditCustomInput(' ')} className="w-full py-3 border border-dashed border-[#C8A882]/40 rounded-2xl text-xs font-medium text-[#C8A882] tracking-wide">+ 新增日記標題</button>
                                        )
                                    )}
                                    {/* legacy */}
                                    {!record.diaryFields && record.sentence && (
                                        <div className="space-y-3">
                                            <p className="text-sm font-medium text-[#A89080] tracking-wide">對自己的新發現</p>
                                            <div className="p-5 rounded-[1.5rem] border border-[#F3E5D8]">
                                                <p className="text-sm font-light text-[#8D7B6D] leading-relaxed whitespace-pre-wrap">{record.sentence}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })()}

                        {/* 情境脈絡 */}
                        {record.type !== 'diary' && (record.timingBefore || record.timingDuring || record.timingAfter || isEditing) && (
                            <div className="space-y-3">
                                <p className="text-sm font-medium text-[#A89080] tracking-wide">情境脈絡</p>
                                <div className="p-5 rounded-[1.5rem] border border-[#F3E5D8] space-y-3">
                                    {[
                                        { key: 'timingBefore', label: '不適出現前', placeholder: '最近身體狀態如何呢？' },
                                        { key: 'timingDuring', label: '不適發生時', placeholder: '當下你正在做什麼呢？' },
                                        { key: 'timingAfter', label: '預期事件', placeholder: '接下來有什麼預定的事，可能讓你提前感到緊張？' },
                                    ].map(({ key, label, placeholder }) => (
                                        (isEditing || record[key]) && (
                                            <div key={key}>
                                                <p className="text-xs text-[#C8A882] font-medium tracking-widest uppercase mb-1">{label}</p>
                                                {isEditing ? (
                                                    <input value={edited[key]||''} onChange={e => setEdited({...edited, [key]: e.target.value})} placeholder={placeholder}
                                                        className="w-full bg-transparent text-sm border-b border-[#F3E5D8] outline-none text-[#8D7B6D] placeholder-[#D1C4B9] pb-1" />
                                                ) : (
                                                    <p className="text-sm text-[#8D7B6D] whitespace-pre-wrap">{record[key]}</p>
                                                )}
                                            </div>
                                        )
                                    ))}
                                </div>
                            </div>
                        )}
                        {/* 我的真實感受是... */}
                        {record.type !== 'diary' && (record.trueFeeling || isEditing) && (
                            <div className="space-y-3">
                                <p className="text-sm font-medium text-[#A89080] tracking-wide">我的真實感受是...</p>
                                <div className="p-5 rounded-[1.5rem] border border-[#F3E5D8]">
                                    {isEditing ? (
                                        <textarea value={edited.trueFeeling || ''} onChange={e => setEdited({...edited, trueFeeling: e.target.value})} placeholder="此刻你內心真實的感受是什麼？" className="w-full bg-transparent text-sm border-none outline-none font-light text-[#8D7B6D] placeholder-[#D1C4B9] h-20 leading-relaxed" />
                                    ) : (
                                        <p className="text-sm font-light text-[#8D7B6D] leading-relaxed tracking-wide whitespace-pre-wrap">{record.trueFeeling || "未紀錄"}</p>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 身體想告訴我... */}
                        {record.type !== 'diary' && (record.bodyLanguage || isEditing) && (
                            <div className="space-y-3">
                                <p className="text-sm font-medium text-[#A89080] tracking-wide">身體想告訴我...</p>
                                <div className="p-5 rounded-[1.5rem] border border-[#F3E5D8]">
                                    {isEditing ? (
                                        <textarea value={edited.bodyLanguage} onChange={e => setEdited({...edited, bodyLanguage: e.target.value})} placeholder="如果身體會說話，你覺得它想告訴你什麼呢？" className="w-full bg-transparent text-sm border-none outline-none font-light text-[#8D7B6D] placeholder-[#D1C4B9] h-20 leading-relaxed" />
                                    ) : (
                                        <p className="text-sm font-light text-[#8D7B6D] leading-relaxed tracking-wide whitespace-pre-wrap">{record.bodyLanguage || "未紀錄"}</p>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {isEditing ? (
                        <>
                        {(record.type === 'body' || record.type === 'mood' || record.type === 'diary') && (() => {
                            const oppositeType = record.type === 'body' ? 'mood' : record.type === 'mood' ? 'body' : null;
                            const linkableRecs = records.filter(r => (oppositeType ? r.type === oppositeType : (r.type === 'body' || r.type === 'mood')) && r.id !== record.id).sort((a,b) => new Date(b.date)-new Date(a.date));
                            const curLinks = edited.links || [];
                            const toggleLink = (id) => setEdited({...edited, links: curLinks.includes(id) ? curLinks.filter(x=>x!==id) : [...curLinks, id]});
                            const getSummary = (r) => r.type === 'body' ? `${[r.area,r.part].filter(Boolean).join(' ')}${(r.sensationData||[]).length?' · '+r.sensationData.slice(0,2).map(s=>s.label).join('、'):''}` : Object.keys(r.moods||{}).slice(0,3).join('、')||'心情記錄';
                            return (
                                <div className="border border-[#F3E5D8] rounded-2xl overflow-hidden mb-3">
                                    <p className="text-xs font-medium text-[#A89080] tracking-wide px-4 py-3 border-b border-[#F3E5D8]">串聯</p>
                                    <div className="px-4 py-3 space-y-2 max-h-52 overflow-y-auto">
                                        {linkableRecs.length === 0 ? <p className="text-xs text-[#D1C4B9]">尚無可串聯的紀錄</p> : linkableRecs.map(r => {
                                            const linked = curLinks.includes(r.id);
                                            return (
                                                <button key={r.id} onClick={() => toggleLink(r.id)}
                                                    className={"w-full flex items-center justify-between px-3 py-2 rounded-xl border text-left transition-all " + (linked ? 'bg-[#C8A882]/10 border-[#C8A882]' : 'bg-white border-[#F3E5D8]')}>
                                                    <div>
                                                        <p className={"text-xs font-medium " + (linked?'text-[#C8A882]':'text-[#8D7B6D]')}>{getSummary(r)}</p>
                                                        <p className="text-[10px] text-[#D1C4B9]">{r.date} · {r.timeSlot}</p>
                                                    </div>

                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>

                                <button onClick={importJSON} className="w-full px-5 py-3.5 text-left text-sm text-[#A89080] tracking-wide flex items-center gap-3 active:bg-[#FAF7F4]">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" transform="rotate(180 12 12)" /></svg>

                <div className="p-6 bg-[#F3E5D8]/30 rounded-[2.5rem] border border-[#F3E5D8]">

                                <p className="text-sm font-medium text-[#C8A882] tracking-wide">{e.label}</p>

                                <p className="text-lg font-light text-[#C8A882]">{e.count}</p>

                                <span className="text-xs text-[#A89080] tracking-widest w-8 shrink-0">到</span>

                        </div>
                        <button onClick={exportJSONRange} className="w-full py-4 rounded-[1.5rem] bg-white border border-[#C8A882] text-[#C8A882] text-sm font-medium tracking-widest active:opacity-80 transition-all mb-3">

                        </button>
                        <button onClick={() => { exportReport(exportRange.from, exportRange.to); setExportRangeOpen(false); }} className="w-full py-4 rounded-[1.5rem] bg-[#C8A882] text-white text-sm font-medium tracking-widest active:opacity-80 transition-all">

    }

    function CategoryLog({ records, type, onDetail, onAdd, onSupplement }) {
        const filtered = records.filter(r => r.type === type);
        const mapTitle = { body: '身體覺察', mood: '心情能量', diary: '日記隨想' };
        const mapIcon = { body: <Icon.Body />, mood: <Icon.Mood />, diary: <Icon.Diary /> };
        return (
            <div className="p-8 animate-fade-in space-y-6 pb-32">
                <header className="pt-4 flex justify-between items-center">
                    <div className="flex items-center gap-3">
                        {mapIcon[type]}
                        <h2 className="text-lg font-light text-[#C8A882] tracking-[0.3em] uppercase">{mapTitle[type]}</h2>
                    </div>
                    <button onClick={onAdd} className="px-4 py-2 bg-[#C8A882] text-white rounded-full text-xs font-medium tracking-widest transition-transform active:scale-95">+ 新增</button>
                </header>
                {filtered.length === 0 && (
                    <div className="text-center py-20 space-y-4">
                        <p className="text-xs text-[#D1C4B9] uppercase font-medium tracking-widest">Gently Left Blank.</p>
                        <button onClick={onAdd} className="text-xs text-[#C8A882] border border-[#C8A882]/40 px-5 py-2.5 rounded-full font-medium tracking-wide">開始第一筆記錄</button>
                    </div>
                )}
                <div className="space-y-4">
                    {filtered.map(r => (
                        <div key={r.id} onClick={(e) => onDetail(r, e)} className="p-6 border border-[#F3E5D8] rounded-[2rem] bg-white cursor-pointer active:bg-[#F3E5D8]/10 transition-all space-y-3">
                            <div className="flex items-center justify-between">
                                <span className="text-xs font-medium text-[#D1C4B9] uppercase tracking-widest">{r.date} · {r.timeSlot}</span>
                                {r.links && r.links.length > 0 && <span className="text-xs text-[#C8A882] flex items-center gap-0.5"><svg className="w-3 h-3 inline" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" d="M6 8h4M3.5 5.5A2.5 2.5 0 016 8a2.5 2.5 0 01-2.5 2.5M12.5 5.5A2.5 2.5 0 0110 8a2.5 2.5 0 002.5 2.5" /></svg> {r.links.length}</span>}
                            </div>
                            {r.type === 'body' ? (
                                <div className="space-y-3">
                                    <p className="text-sm font-medium text-[#C8A882] tracking-wide">{bodyLabel(r)}</p>
                                    {(r.sensationData||[]).length > 0 && (
                                        <div className="flex flex-wrap gap-1.5 pt-3 border-t border-[#F3E5D8]">
                                            {(r.sensationData||[]).map((s,i) => (
                                                <span key={i} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{s.label} {s.intensity}%</span>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ) : r.type === 'mood' ? (
                                <div className="space-y-3">
                                    <p className="text-sm font-medium text-[#C8A882] tracking-wide">{Object.keys(r.moods||{}).slice(0,2).join(' · ')}{Object.keys(r.moods||{}).length > 2 ? ' ...' : ''}</p>
                                    <div className="flex flex-wrap gap-1.5 pt-3 border-t border-[#F3E5D8]">
                                        {Object.entries(r.moods||{}).map(([m,v]) => (
                                            <span key={m} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{m} {v}%</span>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-2 pt-3 border-t border-[#F3E5D8]">
                                        {r.diaryFields ? (() => {
                                            const BUILT_IN_LABELS = { f1:'夢境故事', f2:'飲食情況', f3:'對自己的新發現', f4:'內在呼喚', f5:'溫柔回應', f6:'最深刻的事', f7:'幸運的事', f8:'今日的加分行為' };
                                            const entries = Object.entries(r.diaryFields).filter(([,v]) => v);
                                            return entries.length > 0 ? entries.map(([k, v]) => (
                                                <p key={k} className="text-sm leading-relaxed line-clamp-1">
                                                    <span className="font-medium text-[#A89080]">{BUILT_IN_LABELS[k] || (r.customLabels?.[k] || k)}．</span>
                                                    <span className="font-light text-[#8D7B6D] whitespace-pre-wrap">{v}</span>
                                                </p>
                                            )) : <p className="text-sm font-light text-[#D1C4B9]">Gently Left Blank</p>;
                                        })() : (
                                            <p className="text-sm font-light text-[#8D7B6D] line-clamp-2 leading-relaxed">{r.sentence || ''}</p>
                                        )}
                                    </div>
                            )}
                            {(r.timingBefore || r.timingDuring || r.timingAfter || r.bodyLanguage || r.trueFeeling) && (
                                <div className="pt-1 border-t border-[#F3E5D8] space-y-1.5">
                                    {r.timingBefore && <p className="text-xs leading-relaxed line-clamp-1"><span className="text-[#A89080] font-medium">不適出現前 · </span><span className="text-[#8D7B6D] whitespace-pre-wrap">{r.timingBefore}</span></p>}
                                    {r.timingDuring && <p className="text-xs leading-relaxed line-clamp-1"><span className="text-[#A89080] font-medium">不適發生時 · </span><span className="text-[#8D7B6D] whitespace-pre-wrap">{r.timingDuring}</span></p>}
                                    {r.timingAfter && <p className="text-xs leading-relaxed line-clamp-1"><span className="text-[#A89080] font-medium">預期事件 · </span><span className="text-[#8D7B6D] whitespace-pre-wrap">{r.timingAfter}</span></p>}
                                    {r.trueFeeling && <p className="text-xs leading-relaxed line-clamp-2"><span className="text-[#A89080] font-medium">真實感受 · </span><span className="text-[#8D7B6D] whitespace-pre-wrap">{r.trueFeeling}</span></p>}
                                    {r.bodyLanguage && <p className="text-xs leading-relaxed line-clamp-2"><span className="text-[#A89080] font-medium">身體想告訴我 · </span><span className="text-[#8D7B6D] whitespace-pre-wrap">{r.bodyLanguage}</span></p>}
                                </div>
                            )}
                            {r.links && r.links.length > 0 && (
                                <div className="pt-1.5 space-y-1 border-t border-[#F3E5D8]">
                                    {r.links.map(id => {
                                        const lr = records.find(x => x.id === id);
                                        if (!lr) return null;
                                        const lrSum = lr.type === 'body'
                                            ? `${[lr.area, (lr.side||[]).filter(s=>s!=='不分').join(' '), lr.part].filter(Boolean).join(' ')}${(lr.sensationData||[]).length ? ' · ' + lr.sensationData.slice(0,2).map(s=>s.label+(s.intensity?` ${s.intensity}%`:'')).join('、') : ''}`
                                            : lr.type === 'mood'
                                            ? Object.entries(lr.moods||{}).slice(0,3).map(([k,v])=>`${k} ${v}%`).join('、')
                                            : '日記';
                                        return (
                                            <p key={id} className="text-xs flex items-start gap-1.5">
                                                <svg className="w-3 h-3 inline-block shrink-0 mt-0.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path strokeLinecap="round" d="M6 8h4M3.5 5.5A2.5 2.5 0 016 8a2.5 2.5 0 01-2.5 2.5M12.5 5.5A2.5 2.5 0 0110 8a2.5 2.5 0 002.5 2.5" /></svg>
                                                <span><span className="font-medium text-[#A89080]">已串聯 · </span><span className="font-light text-[#8D7B6D]">{lrSum}</span></span>
                                            </p>
                                        );
                                    })}
                                </div>
                            )}
                        {(r.type === 'body' || r.type === 'mood') && !(r.timingBefore && r.timingDuring && r.timingAfter && r.bodyLanguage && r.trueFeeling) && (
                                <div className="pt-2 flex justify-end" onClick={e => e.stopPropagation()}>
                                    <button onClick={() => onSupplement(r)}
                                        className="text-xs text-[#C8A882] border border-[#F3E5D8] rounded-full px-4 py-1.5 font-medium tracking-widest transition-transform active:scale-95">
                                        + 補充
                                    </button>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            </div>
        );
    }

    // 共用 DateTimeStep
    function DateTimeStep({ date, timeSlot, customTime, onUpdate, onNext, title }) {
        return (
            <div className="space-y-8 py-6 animate-fade-in">
                <p className="text-lg font-medium text-[#A89080] tracking-[0.2em] uppercase text-center">{title}</p>
                <div className="bg-[#F3E5D8]/30 py-4 px-6 rounded-[2rem] border border-[#F3E5D8] text-center">
                    <input type="date" value={date} onChange={e => onUpdate({date: e.target.value})} />
                </div>
                <div className="flex flex-wrap gap-2 justify-center">
                    {TIME_SLOTS.map(slot => (
                        <button key={slot} onClick={() => onUpdate({timeSlot: slot})} className={`px-5 py-2 rounded-full text-xs font-medium transition-all border whitespace-nowrap ${timeSlot === slot ? 'bg-[#C8A882] text-white border-[#C8A882]' : 'bg-white text-[#D1C4B9] border-[#F3E5D8]'}`}>{slot}</button>
                    ))}
                </div>
                {timeSlot === '自定義' && <input value={customTime} onChange={e => onUpdate({customTime: e.target.value})} placeholder="填寫具體時間..." className="w-full bg-[#F3E5D8]/10 p-4 rounded-xl text-center text-sm outline-none border border-[#D1C4B9] placeholder-[#D1C4B9] text-[#C8A882] font-medium" />}
                <button onClick={onNext} className="w-full py-4 bg-[#C8A882] text-white rounded-2xl font-medium tracking-widest uppercase transition-transform active:scale-95 shadow-lg shadow-[#C8A882]/20">下一步</button>
            </div>
        );
    }

    // 共用感受/心情選擇
    function SensationSelector({ groups, selected, onToggle, onIntensityChange, customInput, onCustomInput, onAddCustom, intensityLabel = "強度", savedCustomTags = [] }) {
        const allBuiltIn = groups.flatMap(g => g.items).map(i => i.label);
        const activeCustom = Object.keys(selected).filter(k => !allBuiltIn.includes(k) && k !== '不適感');
        const libraryTags = savedCustomTags.filter(t => !allBuiltIn.includes(t) && t !== '不適感');
        const typeName = intensityLabel === '強度' ? '感受' : '心情';
        const [expandedGroups, setExpandedGroups] = React.useState({});
        const toggleGroup = (title) => setExpandedGroups(prev => ({...prev, [title]: !prev[title]}));

        return (
            <div className="space-y-6">
                {/* 不適感 - 獨立快選 */}
                {(() => {
                    const act = selected['不適感'];
                    return (
                        <div className={"rounded-[2rem] border transition-all p-5 bg-white " + (act ? 'border-[#C8A882]' : 'border-[#F3E5D8]')}>
                            <button onClick={() => onToggle('不適感')} className="w-full text-left flex justify-between items-start">
                                <div className="pr-4">
                                    <p className={"text-sm font-medium tracking-wide " + (act ? 'text-[#C8A882]' : 'text-[#8D7B6D]')}>不適感</p>
                                    <p className="text-xs text-[#D1C4B9] font-medium leading-tight mt-0.5">說不清楚，就是哪裡不舒服。</p>
                                </div>
                                {act && <span className="text-[#C8A882]">✓</span>}
                            </button>
                            {act && (
                                <div className="mt-4 pt-4 border-t border-dashed border-[#F3E5D8] space-y-2 animate-fade-in">
                                    <div className="flex justify-between text-xs font-medium text-[#C8A882] uppercase tracking-widest"><span>{intensityLabel}</span><span>{act}%</span></div>
                                    <input type="range" min="0" max="100" value={act} onChange={e => onIntensityChange('不適感', e.target.value)} className="w-full" />
                                </div>
                            )}
                        </div>
                    );
                })()}
                {groups.map(group => {
                    const hasSelected = group.items.some(i => selected[i.label]);
                    const isOpen = expandedGroups[group.title] || hasSelected || group.defaultOpen;
                    return (
                    <div key={group.title} className="space-y-3">
                        <button onClick={() => toggleGroup(group.title)} className="w-full flex items-center justify-between border-l-2 border-[#C8A882] pl-3 py-0.5">
                            <div className="text-left">
                                <h3 className="text-base font-medium text-[#C8A882] uppercase tracking-widest">{group.title}</h3>
                                <p className="text-xs text-[#D1C4B9] font-medium leading-relaxed mt-0.5">{group.desc}</p>
                            </div>
                            <span className={"text-[#C8A882] text-lg font-light ml-3 " + (hasSelected ? 'opacity-100' : 'opacity-60')}>{isOpen ? '−' : '+'}</span>
                        </button>
                        {isOpen && <div className="grid grid-cols-1 gap-3">
                            {group.items.map(item => {
                                const act = selected[item.label];
                                return (
                                    <div key={item.label} className={"rounded-[2rem] border transition-all p-5 bg-white " + (act ? 'border-[#C8A882]' : 'border-[#F3E5D8]')}>
                                        <button onClick={() => onToggle(item.label)} className="w-full text-left flex justify-between items-start">
                                            <div className="pr-4">
                                                <p className={"text-sm font-medium tracking-wide " + (act ? 'text-[#C8A882]' : 'text-[#8D7B6D]')}>{item.label}</p>
                                                <p className="text-xs text-[#D1C4B9] font-medium leading-tight mt-0.5">{item.sub}</p>
                                            </div>
                                            {act && <span className="text-[#C8A882]">✓</span>}
                                        </button>
                                        {act && (
                                            <div className="mt-4 pt-4 border-t border-dashed border-[#F3E5D8] space-y-2 animate-fade-in">
                                                <div className="flex justify-between text-xs font-medium text-[#C8A882] uppercase tracking-widest"><span>{intensityLabel}</span><span>{act}%</span></div>
                                                <input type="range" className="w-full" value={act} onChange={e => onIntensityChange(item.label, e.target.value)} />
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>}
                    </div>
                    );
                })}
                {/* 自訂標籤庫 + 已啟用自訂 */}
                <div className="space-y-3">
                    <div className="border-l-2 border-[#F3E5D8] pl-3 py-0.5">
                        <h3 className="text-base font-medium text-[#A89080] uppercase tracking-widest">我的{typeName}</h3>

    function DiaryRecorder({ onSave, onCancel }) {
        const PROMPTS = [
            "如果此刻你的心是一張紙，它是平整的還是充滿摺痕的？",
            "今天你的頻率在哪個狀態上最讓自己舒服？",
            "試著捕捉一個你今天「照顧了自己」的細微動作。",
            "今天有什麼時刻，你感覺到自己真實存在著？",
            "如果把今天的狀態用一種天氣描述，是什麼天氣？",
            "今天的你，最需要被什麼溫柔對待？",
        ];
        // FIELD_GROUPS: id is used as a "slot" key for rendering choice
        // type 'pair' means f4+f5 shown together
        const FIELD_GROUPS = [
            { id: 'f1', label: '夢境故事', type: 'single',
              fields: [{ key: 'f1', placeholder: '記下今晚或最近做的夢，或是腦中浮現的畫面' }] },
            { id: 'f2', label: '飲食情況', type: 'single',
              fields: [{ key: 'f2', placeholder: '記下今天吃了什麼，身體有什麼感受' }] },
            { id: 'f3', label: '對自己的新發現', type: 'single',
              fields: [{ key: 'f3', placeholder: '記下過去未曾注意過的自己' }] },
            { id: 'f45', label: '內在呼喚與溫柔回應', type: 'pair',
              fields: [
                { key: 'f4', label: '內在呼喚', placeholder: '記下今天想被幫忙的時刻' },
                { key: 'f5', label: '溫柔回應', placeholder: '如果是你最重視的人需要你寫在上方的幫忙，你會如何回應' },
              ]},
            { id: 'f6', label: '最深刻的事', type: 'single',
              fields: [{ key: 'f6', placeholder: '記下今天最讓你印象深刻的一件事' }] },
            { id: 'f7', label: '幸運的事', type: 'single',
              fields: [{ key: 'f7', placeholder: '記下今天發生的一件幸運或美好的小事' }] },
            { id: 'f8', label: '今日的加分行為', type: 'single',
              fields: [{ key: 'f8', placeholder: '記下今天做了什麼讓自己更好的事' }] },
        ];

        const [prompt] = useState(() => PROMPTS[Math.floor(Math.random() * PROMPTS.length)]);
        const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
        const [fields, setFields] = useState({ f1: '', f2: '', f3: '', f4: '', f5: '', f6: '', f7: '', f8: '' });
        const [customGroups, setCustomGroups] = useState([]); // [{id, label, key}]
        const [customInput, setCustomInput] = useState('');
        const [selected, setSelected] = useState(null); // null=step1
        const [savedDiaryTitles] = useState(() => getDiaryCustomTitles());
        const setF = (k, v) => setFields(prev => ({...prev, [k]: v}));
        const hasContent = Object.values(fields).some(v => v && v.trim()) ||
            customGroups.some(cg => fields[cg.key] && fields[cg.key].trim());

        const toggleSelect = (id) => {
            setSelected(prev => {
                const arr = prev || [];
                return arr.includes(id) ? arr.filter(k => k !== id) : [...arr, id];
            });
        };

        const addCustomGroup = () => {
            const label = customInput.trim();
            if (!label) return;
            const key = 'custom_' + Date.now();
            setCustomGroups(prev => [...prev, { id: key, label, key }]);
            saveDiaryCustomTitle(label); // 記憶到標籤庫
            if (!selected) setSelected([key]);
            else setSelected(prev => [...(prev||[]), key]);
            setCustomInput('');
        };

        // Step 1: pick fields
        if (selected === null) {
            const allGroups = [...FIELD_GROUPS, ...customGroups.map(cg => ({...cg, type: 'single', fields: [{key: cg.key, placeholder: '寫下你的想法...'}]}))];
            return (
                <div className="p-8 space-y-8 pb-32 animate-fade-in">

                    <div className="bg-[#F3E5D8]/30 py-4 px-6 rounded-[2rem] border border-[#F3E5D8] text-center">
                        <input type="date" value={date} onChange={e => setDate(e.target.value)} />
                    </div>
                    <div className="space-y-4">
                        <p className="text-sm font-light text-[#D1C4B9] tracking-widest text-center">你今天想記錄的是...</p>
                        <div className="space-y-3">

                                        <span className={`text-sm ${isOn ? 'text-[#C8A882]' : 'text-[#D1C4B9]'}`}>{isOn ? '✓' : '+'}</span>
                                    </button>
                                );

                            {/* 自訂義 */}

                                <div className="p-4 border border-dashed border-[#C8A882]/60 rounded-2xl flex items-center gap-3 animate-fade-in">
                                    <input value={customInput} onChange={e => setCustomInput(e.target.value)} placeholder="輸入標題名稱..." className="flex-1 text-sm font-medium outline-none text-[#C8A882] bg-transparent placeholder-[#C8A882]/40"

                            )}

                            {savedDiaryTitles.filter(t => !customGroups.some(cg => cg.label === t)).length > 0 && (
                                <div className="pt-2 space-y-2">
                                    <p className="text-[10px] text-[#D1C4B9] tracking-widest text-center">曾經使用過的標題</p>
                                    <div className="flex flex-wrap gap-2">
                                        {savedDiaryTitles.filter(t => !customGroups.some(cg => cg.label === t)).map(title => (
                                            <button key={title} onClick={() => {
                                                const key = 'custom_' + Date.now() + Math.random();

                                                setSelected(prev => [...(prev||[]), key]);
                                            }} className="px-3 py-1.5 rounded-full border border-[#C8A882]/40 text-xs text-[#C8A882] bg-white active:bg-[#F3E5D8]/50 transition-all">
                                                {title}

                                        ))}
                                    </div>
                                </div>

                        </div>
                    </div>
                    <button
