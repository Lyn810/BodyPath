    const DEFAULT_TIMING_TAGS = {
        before: ['久坐', '熬夜', '空腹', '飯後', '運動後', '壓力大', '月經期間', '睡眠不足'],
        during: ['工作中', '開會時', '如廁時', '睡眠中', '走路時', '用餐時', '久站後'],
        after:  ['重要會議', '考試', '出差', '比賽', '上台', '就醫', '長途旅行'],
    };

    function loadTags(type) {
        try {
            const raw = localStorage.getItem(TAG_STORAGE[type]);
            return raw ? JSON.parse(raw) : null;
        } catch(e) { return null; }
    }function saveTags(type, data) {
        localStorage.setItem(TAG_STORAGE[type], JSON.stringify(data));
    }function getTimingTags() {
        return loadTags('timing') || JSON.parse(JSON.stringify(DEFAULT_TIMING_TAGS));
    }function getBodyCustomTags() {
        return loadTags('body') || [];
    }function getMoodCustomTags() {

    }function SavedModal({ justSaved, onSupplement, onClose }) {
        if (!justSaved) return null;
        return (
            <div className="fixed inset-0 z-[200] flex items-center justify-center px-8"

    }function TimingCustomInput({ placeholder, onAdd, selectedTags, onToggle }) {

        return (

    }function SupplementPage({ record, onSave, onClose }) {
        const hasTiming = !!(record.timingBefore || record.timingDuring || record.timingAfter);
        const hasFeeling = !!record.trueFeeling;
        const hasBody = !!record.bodyLanguage;

        const [selected, setSelected] = React.useState([]);
        const [timingBefore, setTimingBefore] = React.useState(record.timingBefore || '');
        const [timingDuring, setTimingDuring] = React.useState(record.timingDuring || '');
        const [timingAfter, setTimingAfter] = React.useState(record.timingAfter || '');
        const [bodyLanguage, setBodyLanguage] = React.useState(record.bodyLanguage || '');
        const [trueFeeling, setTrueFeeling] = React.useState(record.trueFeeling || '');

        const toggle = (key) => setSelected(s => s.includes(key) ? s.filter(k => k !== key) : [...s, key]);

        const handleSave = () => {
            onSave({
                ...record,
                timingBefore, timingDuring, timingAfter,
                bodyLanguage, trueFeeling,
            });

        };

        return (
            <div className="fixed inset-0 z-[150] flex items-end justify-center" onClick={onClose}>

                                <p className="text-base font-medium text-[#8D7B6D] leading-snug">
                                    {record.type === 'body' ? (
                                        [record.area, record.part, record.side?.join(''), (record.sensationData||[]).slice(0,2).map(s=>`${s.label} ${s.intensity}%`).join('・')].filter(Boolean).join(' · ')
                                    ) : (
                                        Object.entries(record.moods||{}).slice(0,2).map(([k,v])=>`${k} ${v}%`).join('・')
                                    )}
                                </p>
                            </div>
                        </div>

                        {/* Three option cards */}
                        <div className="space-y-3 text-left">

                            {/* 情境脈絡 */}
                            <div className="border border-[#F3E5D8] rounded-[2rem] overflow-hidden">
                                <button onClick={() => toggle('timing')}
                                    className="w-full flex items-center justify-between px-6 py-5 text-left">
                                    <div>
                                        <p className="text-sm font-medium text-[#A89080] tracking-wide">情境脈絡</p>
                                        {(timingBefore || timingDuring || timingAfter) && !selected.includes('timing') && (
                                            <p className="text-xs text-[#C8A882] mt-1 line-clamp-1">
                                                {[timingBefore, timingDuring, timingAfter].filter(Boolean).join('・')}
                                            </p>
                                        )}
                                    </div>
                                    <span className="text-[#C8A882] text-xl font-light">{selected.includes('timing') ? '−' : '+'}</span>
                                </button>
                                {selected.includes('timing') && (() => {
                                    const timingTags = getTimingTags();
                                    const slotConfig = [
                                        { key: 'before', label: '不適出現前', val: timingBefore, set: setTimingBefore, tags: timingTags.before, placeholder: '最近身體狀態如何呢？' },
                                        { key: 'during', label: '不適發生時', val: timingDuring, set: setTimingDuring, tags: timingTags.during, placeholder: '當下你正在做什麼呢？' },
                                        { key: 'after',  label: '預期事件',   val: timingAfter,  set: setTimingAfter,  tags: timingTags.after,  placeholder: '接下來有什麼預定的事，可能讓你提前感到緊張？' },
                                    ];
                                    return (
                                        <div className="px-6 pb-6 space-y-5">
                                            {slotConfig.map(({ key, label, val, set, tags, placeholder }) => {
                                                const selected_tags = val ? val.split('、').map(s=>s.trim()).filter(Boolean) : [];
                                                const toggleTag = (tag) => {
                                                    const next = selected_tags.includes(tag)
                                                        ? selected_tags.filter(t => t !== tag)
                                                        : [...selected_tags, tag];
                                                    set(next.join('、'));
                                                };
                                                const addCustomTag = (newTag) => {
                                                    if (!newTag.trim()) return;
                                                    // persist to tag library
                                                    const tt = getTimingTags();
                                                    if (!tt[key].includes(newTag.trim())) {
                                                        tt[key] = [...tt[key], newTag.trim()];
                                                        saveTags('timing', tt);
                                                    }
                                                    toggleTag(newTag.trim());
                                                };
                                                return (
                                                    <div key={key} className="space-y-2">
                                                        <p className="text-xs font-medium text-[#C8A882] tracking-widest ml-1">{label}</p>
                                                        <div className="flex flex-wrap gap-2">
                                                            {tags.map(tag => (
                                                                <button key={tag} onClick={() => toggleTag(tag)}
                                                                    className={`px-3 py-1.5 rounded-full text-xs font-medium tracking-wide transition-all ${selected_tags.includes(tag) ? 'bg-[#C8A882] text-white' : 'border border-[#F3E5D8] text-[#A89080]'}`}>
                                                                    {tag}
                                                                </button>
                                                            ))}
                                                        </div>
                                                        <TimingCustomInput placeholder={placeholder} onAdd={addCustomTag} selectedTags={selected_tags} onToggle={toggleTag} />
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    );
                                })()}
                            </div>

                            {/* 我的真實感受 */}
                            <div className="border border-[#F3E5D8] rounded-[2rem] overflow-hidden">
                                <button onClick={() => toggle('feeling')}
                                    className="w-full flex items-center justify-between px-6 py-5 text-left">
                                    <div>
                                        <p className="text-sm font-medium text-[#A89080] tracking-wide">我的真實感受是...</p>
                                        {trueFeeling && !selected.includes('feeling') && (
                                            <p className="text-xs text-[#C8A882] mt-1 line-clamp-1">{trueFeeling}</p>
                                        )}
                                    </div>
                                    <span className="text-[#C8A882] text-xl font-light">{selected.includes('feeling') ? '−' : '+'}</span>
                                </button>
                                {selected.includes('feeling') && (
                                    <div className="px-6 pb-6">
                                        <textarea value={trueFeeling} onChange={e => setTrueFeeling(e.target.value)}
                                            placeholder="此刻你內心真實的感受是什麼？"
                                            className="w-full bg-[#FAF7F4] p-5 rounded-3xl text-sm outline-none border border-[#F3E5D8] h-28 leading-relaxed text-[#8D7B6D] placeholder-[#D1C4B9]" />
                                    </div>
                                )}
                            </div>

                            {/* 身體想告訴我 */}
                            <div className="border border-[#F3E5D8] rounded-[2rem] overflow-hidden">
                                <button onClick={() => toggle('body')}
                                    className="w-full flex items-center justify-between px-6 py-5 text-left">
                                    <div>
                                        <p className="text-sm font-medium text-[#A89080] tracking-wide">身體想告訴我...</p>
                                        {bodyLanguage && !selected.includes('body') && (
                                            <p className="text-xs text-[#C8A882] mt-1 line-clamp-1">{bodyLanguage}</p>
                                        )}
                                    </div>
                                    <span className="text-[#C8A882] text-xl font-light">{selected.includes('body') ? '−' : '+'}</span>
                                </button>

                                        <textarea value={bodyLanguage} onChange={e => setBodyLanguage(e.target.value)}

                                            className="w-full bg-[#FAF7F4] p-5 rounded-3xl text-sm outline-none border border-[#F3E5D8] h-28 leading-relaxed text-[#8D7B6D] placeholder-[#D1C4B9]" />
                                    </div>
                                )}
                            </div>

                        <div className="space-y-3 pt-2">
                            <button onClick={handleSave} disabled={!hasContent}
                                className={`w-full py-4 rounded-full text-sm font-medium tracking-widest uppercase transition-all ${hasContent ? 'bg-[#C8A882] text-white' : 'bg-[#F3E5D8] text-[#D1C4B9]'}`}>
                                儲存補充

                                略過

                        </div>

                </div>
            </div>
        );
    }function TagManagerPage({ onClose }) {
    const [tab, setTab] = React.useState('body');
    const [bodyTags, setBodyTagsState] = React.useState(() => getBodyCustomTags());
    const [moodTags, setMoodTagsState] = React.useState(() => getMoodCustomTags());
    const [timingTags, setTimingTagsState] = React.useState(() => getTimingTags());
    const [editingTag, setEditingTag] = React.useState(null);
    const [newInput, setNewInput] = React.useState('');

    const saveBody = (tags) => { setBodyTagsState(tags); saveTags('body', tags); };
    const saveMood = (tags) => { setMoodTagsState(tags); saveTags('mood', tags); };
    const saveTiming = (tt) => { setTimingTagsState(tt); saveTags('timing', tt); };

    const deleteTag = (type, slot, idx, tagName) => {
        if (!window.confirm(`確定要刪除「${tagName}」嗎？`)) return;
        if (type === 'body') { const t = [...bodyTags]; t.splice(idx, 1); saveBody(t); }
        else if (type === 'mood') { const t = [...moodTags]; t.splice(idx, 1); saveMood(t); }
        else { const tt = {...timingTags, [slot]: timingTags[slot].filter((_,i)=>i!==idx) }; saveTiming(tt); }
    };
    const renameTag = (type, slot, idx, newVal) => {
        if (!newVal.trim()) return;
        if (type === 'body') { const t = [...bodyTags]; t[idx] = newVal.trim(); saveBody(t); }
        else if (type === 'mood') { const t = [...moodTags]; t[idx] = newVal.trim(); saveMood(t); }
        else { const sl = [...timingTags[slot]]; sl[idx] = newVal.trim(); saveTiming({...timingTags, [slot]: sl}); }
        setEditingTag(null);
    };
    const addTag = (type, slot) => {
        if (!newInput.trim()) return;
        const v = newInput.trim();
        if (type === 'body' && !bodyTags.includes(v)) saveBody([...bodyTags, v]);
        else if (type === 'mood' && !moodTags.includes(v)) saveMood([...moodTags, v]);
        else if (type === 'timing' && !timingTags[slot].includes(v)) saveTiming({...timingTags, [slot]: [...timingTags[slot], v]});
        setNewInput('');
    };

    const renderTagList = (tags, type, slot) => {
        return (
            <div className="space-y-2">
                {tags.length === 0 && <p className="text-xs text-[#D1C4B9] text-center py-4">尚無標籤</p>}
                {tags.map((tag, idx) => (
                    <div key={idx} className="flex items-center gap-3 px-4 py-3 border border-[#F3E5D8] rounded-2xl bg-white">
                        {editingTag && editingTag.type === type && editingTag.slot === slot && editingTag.index === idx ? (
                            <>
                                <input autoFocus value={editingTag.value}
                                    onChange={e => setEditingTag({...editingTag, value: e.target.value})}
                                    onKeyDown={e => { if(e.key==='Enter') renameTag(type, slot, idx, editingTag.value); if(e.key==='Escape') setEditingTag(null); }}
                                    className="flex-1 text-sm outline-none text-[#8D7B6D] bg-transparent border-b border-[#C8A882]" />
                                <button onClick={() => renameTag(type, slot, idx, editingTag.value)} className="text-xs text-white bg-[#C8A882] px-3 py-1 rounded-full">儲存</button>
                                <button onClick={() => setEditingTag(null)} className="text-xs text-[#A89080]">取消</button>
                            </>
                        ) : (
                            <>
                                <span className="flex-1 text-sm text-[#8D7B6D]">{tag}</span>
                                <button onClick={() => setEditingTag({ type, slot, index: idx, value: tag })} className="text-xs text-[#A89080] px-2">改名</button>
                                <button onClick={() => deleteTag(type, slot, idx, tag)} className="text-xs text-[#D1C4B9] px-1">✕</button>
                            </>
                        )}
                    </div>
                ))}
                <div className="flex gap-2 pt-1">
                    <input value={newInput} onChange={e => setNewInput(e.target.value)}
                        onKeyDown={e => { if(e.key==='Enter') addTag(type, slot); }}
                        placeholder="新增標籤..."
                        className="flex-1 text-sm outline-none border-b border-[#F3E5D8] text-[#8D7B6D] placeholder-[#D1C4B9] py-1.5 bg-transparent" />
                    {newInput.trim() && <button onClick={() => addTag(type, slot)} className="text-xs text-white bg-[#C8A882] px-3 py-1.5 rounded-full">新增</button>}
                </div>
            </div>
        );
    };

    const TIMING_SLOTS = [
        { key: 'before', label: '不適出現前' },
        { key: 'during', label: '不適發生時' },
        { key: 'after',  label: '預期事件' },
    ];

    return (
        <div className="fixed inset-0 z-[300] bg-white flex flex-col max-w-[428px] mx-auto">
            <div className="flex items-center justify-between px-8 pt-12 pb-4 border-b border-[#F3E5D8]">
                <h2 className="text-lg font-light text-[#C8A882] tracking-[0.2em]">標籤管理</h2>
                <button onClick={onClose} className="text-[#A89080] text-xl">✕</button>
            </div>
            <div className="flex gap-2 px-8 py-4 border-b border-[#F3E5D8]">
                {[['body','身體感受'],['mood','心情'],['timing','情境脈絡']].map(([key,label]) => (
                    <button key={key} onClick={() => { setTab(key); setNewInput(''); setEditingTag(null); }}
                        className={"px-4 py-1.5 rounded-full text-xs font-medium tracking-widest transition-all " + (tab===key ? 'bg-[#C8A882] text-white' : 'border border-[#F3E5D8] text-[#A89080]')}>
                        {label}
                    </button>
                ))}
            </div>
            <div className="flex-1 overflow-y-auto px-8 py-6 space-y-4">
                {tab === 'body' && renderTagList(bodyTags, 'body', null)}
                {tab === 'mood' && renderTagList(moodTags, 'mood', null)}
                {tab === 'timing' && TIMING_SLOTS.map(({ key, label }) => (
                    <div key={key} className="space-y-3">
                        <p className="text-xs font-medium text-[#C8A882] tracking-widest">{label}</p>
                        {renderTagList(timingTags[key] || [], 'timing', key)}
                    </div>
                ))}
            </div>
        </div>
    );
}function App() {
        const [tab, setTab] = useState('home');
        const [prevTab, setPrevTab] = useState('home');
        const [records, setRecords] = useState(JSON.parse(localStorage.getItem('bp_v25_all') || '[]'));
        const [selectedDetail, setSelectedDetail] = useState(null);
        const [detailClickY, setDetailClickY] = useState(null);
        const [justSaved, setJustSaved] = useState(null); // { id, type } for post-save toast
        const [supplementRecord, setSupplementRecord] = useState(null); // record open in SupplementPage

        const switchTab = (newTab) => {
            setPrevTab(tab);
            setTab(newTab);
        };

        const mainRef = useRef(null);

        useEffect(() => {
            if (mainRef.current) mainRef.current.scrollTop = 0;
        }, [tab]);

        const openDetail = (record, e) => {
            if (e) {
                const container = document.querySelector('.app-container');
                const rect = container ? container.getBoundingClientRect() : { top: 0, height: window.innerHeight };
                const relY = ((e.clientY - rect.top) / rect.height) * 100;
                setDetailClickY(relY);
            }
            setSelectedDetail(record);
        };

        useEffect(() => { localStorage.setItem('bp_v25_all', JSON.stringify(records)); }, [records]);

        const addRecord = (r) => {
            const newId = Date.now();
            const newRecord = { ...r, id: newId };
            const newList = [newRecord, ...records];
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            // Show post-save toast for body/mood only
            if (r.type === 'body' || r.type === 'mood') {
                setJustSaved({ id: newId, record: newRecord });
            }
            // Go back to where we came from
            if (tab === 'body_rec') switchTab(prevTab === 'body' ? 'body' : 'home');
            else if (tab === 'mood_rec') switchTab(prevTab === 'mood' ? 'mood' : 'home');
            else if (tab === 'diary_rec') switchTab(prevTab === 'diary' ? 'diary' : 'home');
            else switchTab('home');
        };

        const updateRecord = (updatedR) => {
            const newList = records.map(r => r.id === updatedR.id ? updatedR : r);
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            setSelectedDetail(null);
        };

        const saveSupplementRecord = (updatedR) => {
            const newList = records.map(r => r.id === updatedR.id ? updatedR : r);
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            setSupplementRecord(null);
        };

        const deleteRecord = (id) => {
            if(window.confirm("確定要刪除這筆覺察紀錄嗎？")) {
                setRecords(records.filter(r => r.id !== id));
                setSelectedDetail(null);
            }
        };

        return (
            <div className="flex justify-center min-h-screen bg-[#f8f8f8]">
                <div className="app-container shadow-2xl">
                    <main ref={mainRef} className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        {tab === 'home' && <HomePage switchTab={switchTab} records={records} onDetail={openDetail} />}
                        
                        {tab === 'body' && <CategoryLog records={records} type="body" onBack={() => switchTab('home')} onDetail={openDetail} onAdd={() => switchTab('body_rec')} onSupplement={(r) => setSupplementRecord(r)} />}
                        {tab === 'mood' && <CategoryLog records={records} type="mood" onBack={() => switchTab('home')} onDetail={openDetail} onAdd={() => switchTab('mood_rec')} onSupplement={(r) => setSupplementRecord(r)} />}
                        {tab === 'diary' && <CategoryLog records={records} type="diary" onBack={() => switchTab('home')} onDetail={openDetail} onAdd={() => switchTab('diary_rec')} />}
                        {tab === 'body_rec' && <BodyRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'body' ? 'body' : 'home')} savedCustomTags={getBodyCustomTags()} onAddCustom={(tag) => { const t = getBodyCustomTags(); if(!t.includes(tag)) saveTags('body',[...t,tag]); }} />}
                        {tab === 'mood_rec' && <MoodRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'mood' ? 'mood' : 'home')} savedCustomTags={getMoodCustomTags()} onAddCustom={(tag) => { const t = getMoodCustomTags(); if(!t.includes(tag)) saveTags('mood',[...t,tag]); }} />}
                        {tab === 'diary_rec' && <DiaryRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'diary' ? 'diary' : 'home')} />}
                        {tab === 'lab' && <MiniLab records={records} setRecords={setRecords} onDetail={openDetail} onSupplement={(r) => setSupplementRecord(r)} />}
                        {tab === 'calendar' && <CalendarPage records={records} setRecords={setRecords} onDetail={openDetail} />}
                        {tab === 'trend' && <TrendPage records={records} />}
                    </main>

                    <SavedModal
                        justSaved={justSaved}
                        onSupplement={() => {
                            if (justSaved) {
                                setSupplementRecord(justSaved.record);
                                setJustSaved(null);
                            }
                        }}
                        onClose={() => setJustSaved(null)}
                    />
                    {supplementRecord && (
                        <SupplementPage
                            record={supplementRecord}
                            onSave={saveSupplementRecord}
                            onClose={() => setSupplementRecord(null)}
                        />
                    )}
                    {selectedDetail && <DetailModal record={selectedDetail} clickY={detailClickY} onClose={() => setSelectedDetail(null)} onUpdate={updateRecord} onDelete={deleteRecord} />}

                    <nav className="fixed bottom-0 w-full max-w-[428px] h-20 bg-white border-t border-[#F3E5D8] flex items-center justify-around px-2 z-50">
                        <NavBtn active={tab === 'home'} onClick={() => switchTab('home')} label="首頁" icon={<Icon.Home />} />
                        <NavBtn active={tab === 'body'} onClick={() => switchTab('body')} label="身體" icon={<Icon.Body />} />
                        <NavBtn active={tab === 'mood'} onClick={() => switchTab('mood')} label="心情" icon={<Icon.Mood />} />
                        <NavBtn active={tab === 'diary'} onClick={() => switchTab('diary')} label="日記" icon={<Icon.Diary />} />
                        <NavBtn active={tab === 'lab'} onClick={() => switchTab('lab')} label="調頻" icon={<Icon.Calendar />} />
                    </nav>
                </div>
            </div>
        );
    }
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script></body></html>
