<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BodyPath">
    <link rel="apple-touch-icon" href="image/icon.png"> <!-- 這是 App 圖示 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#C8A882">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BodyPath - 純粹覺察</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        :root {
            --ancient-gold: #C8A882;
            --light-beige: #D1C4B9;
            --white: #FFFFFF;
            --danger-muted: #8D7B6D;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8f8f8; 
            color: var(--ancient-gold); 
            font-weight: 300;
            margin: 0;
            padding: 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="range"] { accent-color: var(--ancient-gold); }
        input[type="date"] { border: none; background: transparent; font-family: inherit; color: var(--ancient-gold); text-align: center; font-size: 1.1rem; outline: none; width: 100%; }
        
        .app-container {
            width: 100%;
            max-width: 430px;
            background-color: var(--white);
            min-height: 100vh;
            position: relative;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #F3E5D8;
            border-right: 1px solid #F3E5D8;
            box-sizing: border-box;
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .record-modal { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        * { box-shadow: none !important; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- 圖示組件 ---
    const Icon = {
        Home: () => <svg className="w-7 h-7" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75" /></svg>,
        Body: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>,
        Mood: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>,
        Diary: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18c-2.305 0-4.408.867-6 2.292m0-14.25v14.25" /></svg>,
        Lab: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M9 3h6M10 3v12a2 2 0 002 2 2 2 0 002-2V3M9 19h6" /></svg>,
        Trend: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>,
        Calendar: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
    };

    const TIME_SLOTS = ["凌晨", "上午", "下午", "晚上", "半夜", "自定義"];
    const BODY_STRUCTURE = {
        "頭部": ["眼", "耳", "鼻", "口", "額頭", "太陽穴", "臉頰", "下巴", "頭頂", "頭側", "後腦杓"],
        "頸部": ["喉嚨", "正面", "側面", "後頸"],
        "手部": ["肩", "上手臂", "手肘", "下手臂", "手腕", "手指"],
        "胸腹": ["鎖骨", "上胸", "胸部", "上腹(胃)", "肚臍", "下腹", "私密處"],
        "背腰部": ["肩胛骨", "上背", "後腰", "下背", "臀部"],
        "腿部": ["大腿", "膝蓋", "小腿", "腳踝", "腳背", "腳掌"]
    };

    const SENSATION_GROUPS = [
        { title: "壓力的信使", desc: "這是現代人最常見的感受，通常與肌肉的長期收縮有關。", items: [{ label: "緊繃", sub: "像是一根拉太緊的琴弦，無法放鬆。" }, { label: "僵硬", sub: "像關節被膠水黏住，活動度受限。" }, { label: "沉重", sub: "感覺四肢像灌了鉛，或是肩膀上坐著一個人。" }, { label: "壓迫感", sub: "像是胸口壓著石頭，或是頭部被緊緊箍住。" }] },
        { title: "神經的共鳴", desc: "這些感受通常比較尖銳或帶有電子感，指向神經系統的反應。", items: [{ label: "麻木", sub: "失去觸感，像是肢體「睡著了」。" }, { label: "發麻", sub: "像是有小螞蟻在皮膚上爬，或是微小的電流感。" }, { label: "刺痛", sub: "像被細針輕輕扎到。" }, { label: "抽痛", sub: "隨著心跳節奏一跳一跳的疼痛。" }] },
        { title: "流動與能量", desc: "這些感受與血液循環或代謝有關。", items: [{ label: "發熱", sub: "某個部位燙燙的，或是內在的一團火。" }, { label: "冰冷", sub: "即使環境溫暖，手腳依然像冰塊。" }, { label: "腫脹", sub: "感覺皮膚被撐開，或是腹部充滿氣體。" }, { label: "虛弱", sub: "胃部或胸口有一種空空、虛弱的感覺。" }] },
        { title: "質感的異樣", desc: "這些是比較難以言喻、具有特定物理質感的感受。", items: [{ label: "痠", sub: "運動後或疲勞累積的深層疲軟感。" }, { label: "癢", sub: "內在或表皮的騷動。" }, { label: "緊縮", sub: "喉嚨或胃部像被一隻手握住。" }, { label: "震動", sub: "內在極細微的顫抖。" }] },
        { title: "節奏的失衡", desc: "能量與節奏感的紊亂。", items: [{ label: "悶", sub: "呼吸不順暢，或是空間感變窄。" }, { label: "虛脫", sub: "全身沒力氣，像是電力耗盡。" }, { label: "緊繃抽動", sub: "眼皮或肌肉不自覺地跳動。" }] }
    ];

    const MOOD_GROUPS = [
        { title: "向內凝聚", desc: "想要安靜、縮小、保護、沉思", items: [{ label: "平靜", sub: "內心像無風的湖面，不需要特別做什麼。" }, { label: "憂鬱", sub: "像沉入深水，安靜但帶有一種沉重的重量感。" }, { label: "疲累", sub: "電力即將耗盡，只想安靜地待在角落休息。" }, { label: "清澈", sub: "看事情變得很透明，能清楚感知當下的存在。" }, { label: "孤獨", sub: "像獨自在空曠的房間，感覺與外界有一層薄薄的隔閡。" }] },
        { title: "向外擴張", desc: "想要連結、分享、表達、行動", items: [{ label: "喜悅", sub: "內心有微微的暖意在擴散，想分享這份輕盈。" }, { label: "好奇", sub: "像伸出了觸角，對周遭的小事產生了興趣。" }, { label: "憤怒", sub: "像一團燃燒的火，有一股想衝破現狀的力道。" }, { label: "期待", sub: "心跳輕快，像在等待一份即將打開的禮物。" }, { label: "自信", sub: "感覺腳步很紮實，相信自己有能力承接當下。" }] },
        { title: "起伏波動", desc: "感覺不穩定、混亂", items: [{ label: "焦慮", sub: "像快轉的發條，停不下來卻又不知道往哪去。" }, { label: "困惑", sub: "像走進一場大霧，找不到前進或後退的方向。" }, { label: "矛盾", sub: "內心有兩股力量在拉扯，難以決定落腳點。" }, { label: "多愁善感", sub: "情緒像潮汐頻繁起伏，容易被微小的事物觸動。" }, { label: "麻木", sub: "像隔了一層玻璃看世界，感覺不到冷熱與起伏。" }] }
    ];

    function App() {
        const [tab, setTab] = useState('home');
        const [records, setRecords] = useState(JSON.parse(localStorage.getItem('bp_v25_all') || '[]'));
        const [moreType, setMoreType] = useState(null);
        const [selectedDetail, setSelectedDetail] = useState(null);

        useEffect(() => { localStorage.setItem('bp_v25_all', JSON.stringify(records)); }, [records]);

        const addRecord = (r) => {
            const newList = [{ ...r, id: Date.now() }, ...records];
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            setTab('home');
        };

        const updateRecord = (updatedR) => {
            const newList = records.map(r => r.id === updatedR.id ? updatedR : r);
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            setSelectedDetail(null);
        };

        const deleteRecord = (id) => {
            if(window.confirm("確定要刪除這筆覺察紀錄嗎？")) {
                setRecords(records.filter(r => r.id !== id));
                setSelectedDetail(null);
            }
        };

        return (
            <div className="flex justify-center min-h-screen bg-[#f8f8f8]">
                <div className="app-container shadow-2xl">
                    <main className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        {tab === 'home' && <HomePage setTab={setTab} records={records} onMore={setMoreType} onDetail={setSelectedDetail} />}
                        {tab === 'log' && <CategoryLog records={records} type={moreType} onBack={() => setTab('home')} onDetail={setSelectedDetail} />}
                        {tab === 'body' && <BodyRecorder onSave={addRecord} onCancel={() => setTab('home')} />}
                        {tab === 'mood' && <MoodRecorder onSave={addRecord} onCancel={() => setTab('home')} />}
                        {tab === 'diary' && <DiaryRecorder onSave={addRecord} onCancel={() => setTab('home')} />}
                        {tab === 'lab' && <MiniLab records={records} setRecords={setRecords} />}
                        {tab === 'calendar' && <CalendarPage records={records} onDetail={setSelectedDetail} />}
                        {tab === 'trend' && <TrendPage records={records} />}
                    </main>

                    {selectedDetail && <DetailModal record={selectedDetail} onClose={() => setSelectedDetail(null)} onUpdate={updateRecord} onDelete={deleteRecord} />}

                    <nav className="fixed bottom-0 w-full max-w-[428px] h-20 bg-white border-t border-[#F3E5D8] flex items-center justify-around px-2 z-50">
                        <NavBtn active={tab === 'home'} onClick={() => {setTab('home'); setMoreType(null);}} label="首頁" icon={<Icon.Home />} />
                        <NavBtn active={tab === 'body'} onClick={() => setTab('body')} label="身體" icon={<Icon.Body />} />
                        <NavBtn active={tab === 'mood'} onClick={() => setTab('mood')} label="心情" icon={<Icon.Mood />} />
                        <NavBtn active={tab === 'diary'} onClick={() => setTab('diary')} label="日記" icon={<Icon.Diary />} />
                        <NavBtn active={tab === 'lab'} onClick={() => setTab('lab')} label="實驗" icon={<Icon.Lab />} />
                    </nav>
                </div>
            </div>
        );
    }

    function NavBtn({ icon, label, active, onClick }) {
        return (
            <button onClick={onClick} className={`flex flex-col items-center gap-1 flex-1 transition-all ${active ? 'opacity-100 scale-105 font-medium' : 'opacity-30'}`}>
                {icon}
                <span className="text-[10px] font-medium tracking-tighter text-[#C8A882]">{label}</span>
            </button>
        );
    }

    // --- 詳情 Modal ---
    function DetailModal({ record, onClose, onUpdate, onDelete }) {
        const [isEditing, setIsEditing] = useState(false);
        const [edited, setEdited] = useState({...record});
        const cnType = record.type === 'body' ? '身體覺察' : record.type === 'mood' ? '心情能量' : '日記隨想';

        return (
            <div className="absolute inset-0 z-[100] flex items-end animate-fade-in">
                <div className="absolute inset-0 bg-[#C8A882]/10 backdrop-blur-sm" onClick={onClose} />
                <div className="relative w-full bg-white rounded-t-[3rem] p-10 space-y-6 record-modal border-t border-[#F3E5D8] max-h-[90vh] overflow-y-auto no-scrollbar">
                    <div className="w-12 h-1 bg-[#F3E5D8] rounded-full mx-auto" />
                    
                    <div className="flex justify-between items-start text-left">
                        <div className="text-left">
                            <span className="text-[10px] font-medium text-[#D1C4B9] uppercase tracking-widest">{cnType}</span>
                            {isEditing ? (
                                <div className="mt-2 text-left"><input type="date" className="text-left" value={edited.date} onChange={e => setEdited({...edited, date: e.target.value})} /></div>
                            ) : (
                                <h2 className="text-2xl font-light text-[#C8A882] tracking-widest mt-1">{record.date} <span className="text-xs opacity-60 font-medium">· {record.timeSlot}</span></h2>
                            )}
                        </div>
                        <div className="flex gap-2">
                            {!isEditing && <button onClick={() => onDelete(record.id)} className="text-[10px] px-4 py-1.5 border border-[#8D7B6D]/30 rounded-full text-[#8D7B6D] font-medium transition-colors hover:bg-[#8D7B6D]/10">刪除</button>}
                            {!isEditing && <button onClick={() => setIsEditing(true)} className="text-[10px] px-4 py-1.5 border border-[#C8A882] rounded-full text-[#C8A882] font-medium">編輯</button>}
                        </div>
                    </div>

                    <div className="space-y-6 py-4">
                        {record.type === 'body' && (
                            <div className="space-y-4 text-left">
                                <p className="text-lg font-medium text-[#C8A882] text-center uppercase tracking-widest">{edited.side ? edited.side.join(', ') : ''}{record.part}</p>
                                {edited.sensationData.map((s, idx) => (
                                    <div key={idx} className="space-y-2">
                                        <div className="flex justify-between text-sm font-medium text-left"><span>{s.label}</span><span>{s.intensity}%</span></div>
                                        {isEditing && <input type="range" className="w-full" value={s.intensity} onChange={e => { const nd = [...edited.sensationData]; nd[idx].intensity = e.target.value; setEdited({...edited, sensationData: nd}); }} />}
                                    </div>
                                ))}
                            </div>
                        )}
                        {record.type === 'mood' && (
                            <div className="space-y-4 text-left">
                                {Object.entries(edited.moods).map(([m,v]) => (
                                    <div key={m} className="space-y-2">
                                        <div className="flex justify-between text-sm font-medium text-left"><span>{m}</span><span>{v}%</span></div>
                                        {isEditing && <input type="range" className="w-full" value={v} onChange={e => setEdited({...edited, moods: {...edited.moods, [m]: e.target.value}})} />}
                                    </div>
                                ))}
                            </div>
                        )}
                        {record.type === 'diary' && (
                            <div className="space-y-6 text-left">
                                {isEditing ? (
                                    <div className="space-y-4">
                                        <textarea value={edited.sentence} onChange={e => setEdited({...edited, sentence: e.target.value})} className="w-full bg-[#FAF7F4] p-4 rounded-2xl text-sm border border-[#F3E5D8] h-24 outline-none focus:border-[#C8A882]" />
                                        <textarea value={edited.learning} onChange={e => setEdited({...edited, learning: e.target.value})} className="w-full bg-[#FAF7F4] p-4 rounded-2xl text-sm border border-[#F3E5D8] h-24 outline-none focus:border-[#C8A882]" />
                                    </div>
                                ) : (
                                    <div className="space-y-4 text-left">
                                        <div className="bg-[#FAF7F4] p-6 rounded-[2rem] border border-[#F3E5D8] italic">"{record.sentence}"</div>
                                        {record.learning && <div className="bg-[#FAF7F4] p-6 rounded-[2rem] border border-[#F3E5D8]"><p className="text-[10px] text-[#D1C4B9] uppercase font-bold mb-1 tracking-widest font-light">Wisdom</p><p className="text-sm font-medium">{record.learning}</p></div>}
                                    </div>
                                )}
                            </div>
                        )}
                        {record.type !== 'diary' && (
                            <div className="space-y-2 pt-4 border-t border-[#F3E5D8] text-left">
                                <p className="text-[10px] text-[#D1C4B9] uppercase font-light tracking-widest">身體語言</p>
                                {isEditing ? (
                                    <textarea value={edited.bodyLanguage} onChange={e => setEdited({...edited, bodyLanguage: e.target.value})} className="w-full bg-[#FAF7F4] p-4 rounded-2xl text-sm border border-[#F3E5D8] h-24 outline-none focus:border-[#C8A882] font-light" />
                                ) : (
                                    <p className="text-sm font-light text-[#C8A882] italic leading-relaxed">{record.bodyLanguage || "未紀錄"}</p>
                                )}
                            </div>
                        )}
                    </div>
                    {isEditing ? (
                        <div className="flex gap-4"><button onClick={() => setIsEditing(false)} className="flex-1 py-4 text-[#D1C4B9] font-medium text-sm underline uppercase">取消</button><button onClick={() => {onUpdate(edited); setIsEditing(false);}} className="flex-[2] py-4 bg-[#C8A882] text-white rounded-2xl font-medium tracking-widest transition-transform active:scale-95">儲存修改</button></div>
                    ) : (
                        <button onClick={onClose} className="w-full py-4 bg-[#C8A882] text-white rounded-2xl font-medium tracking-widest uppercase transition-transform active:scale-95">關閉</button>
                    )}
                </div>
            </div>
        );
    }

    function HomePage({ setTab, records, onMore, onDetail }) {
        const sections = [{ type: 'body', label: '身體覺察' }, { type: 'mood', label: '心情能量' }, { type: 'diary', label: '日記隨想' }];
        return (
            <div className="p-8 space-y-12 animate-fade-in pb-10">
                <header className="pt-4 flex justify-between items-center text-left">
                    <div className="text-left"><h1 className="text-3xl font-light text-[#C8A882] tracking-[0.3em]">BodyPath</h1><p className="text-[10px] text-[#D1C4B9] mt-2 tracking-[0.2em] uppercase font-medium">&nbsp;Listening to Life</p></div>
                    <div className="flex gap-4"><button onClick={() => setTab('calendar')} className="p-2 border border-[#F3E5D8] rounded-full active:bg-[#F3E5D8]/20 transition-all"><Icon.Calendar /></button><button onClick={() => setTab('trend')} className="p-2 border border-[#F3E5D8] rounded-full active:bg-[#F3E5D8]/20 transition-all"><Icon.Trend /></button></div>
                </header>
                <div className="p-8 bg-[#F3E5D8]/30 rounded-[2.5rem] border border-[#F3E5D8] text-center">
                    <p className="text-[9px] text-[#C8A882] font-medium tracking-widest uppercase">Self-Care Insight</p>
                    <p className="text-sm text-[#C8A882]/80 leading-relaxed italic font-medium mt-2 px-2">"這陣子身體的訊息比較頻繁，可以試試看在早晨醒來時，深呼吸三次，感受今天能量的流動。"</p>
                </div>
                {sections.map(sec => {
                    const filtered = records.filter(r => r.type === sec.type).slice(0, 5);
                    return (
                        <section key={sec.type} className="space-y-4 text-left">
                            <div className="flex justify-between items-end px-1 text-left">
                                <h2 className="text-[11px] font-medium tracking-[0.2em] text-[#C8A882] uppercase">{sec.label}</h2>

                        if (items.length === 0) return null;
                        return (
                            <div key={type} className="space-y-4 animate-fade-in">
                                <p className="text-[10px] font-light text-[#D1C4B9] tracking-widest uppercase ml-2">— {mapTitle[type]}</p>
                                {items.map(i => (
                                    <div key={i.id} onClick={() => onDetail(i)} className="p-6 border border-[#F3E5D8] bg-white rounded-[2rem] space-y-2 cursor-pointer transition-all hover:bg-[#F3E5D8]/10 shadow-sm text-left">
                                        {type === 'body' && <p className="text-sm font-medium text-[#C8A882] leading-relaxed text-left">{i.side ? i.side.join(', ') : ''}{i.part} : {i.sensationData.map(s => s.label).join(', ')}</p>}
                                        {type === 'mood' && <p className="text-sm font-medium text-[#C8A882] leading-relaxed text-left">{Object.keys(i.moods).join(', ')}</p>}
                                        {type === 'diary' && <p className="text-sm font-medium italic text-[#C8A882] leading-relaxed truncate font-light text-left">"{i.sentence}"</p>}
                                        {type === 'lab' && <p className="text-sm font-medium text-[#C8A882] text-left"><span className="opacity-50 font-normal">實驗對策:</span> {i.lab.action}</p>}
                                        <p className="text-[9px] text-[#D1C4B9] mt-2 tracking-tighter uppercase italic font-light text-left">{i.timeSlot}</p>
                                    </div>
                                ))}
                            </div>
                        );
                    })}
                    {filtered.length === 0 && <p className="text-center py-20 text-[10px] text-[#D1C4B9] uppercase font-medium tracking-widest italic animate-fade-in">Gently Left Blank.</p>}
                </div>
            </div>
        );
    }

    function TrendPage({ records }) {
        const [month, setMonth] = useState('2026-03');
        useEffect(() => {
            const CATEGORIES = ["頭部", "頸部", "手部", "胸腹", "背腰部", "腿部"];
            const createLineChart = (id, data, color, bgColor) => {
                const ctx = document.getElementById(id); if(!ctx) return;
                const old = Chart.getChart(ctx); if(old) old.destroy();
                new Chart(ctx, { type: 'line', data: { labels: Array.from({length:31},(_,i)=>i+1), datasets: [{ data, borderColor: color, tension: 0.4, fill: !!bgColor, backgroundColor: bgColor, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, min: 0, max: 100 }, x: { grid: { display: false }, ticks: { color: '#D1C4B9', font: { size: 8 } } } } } });
            };
            const dailyMax = Array.from({length: 31}, (_, i) => { const ds = `${month}-${String(i+1).padStart(2, '0')}`; const dayRecs = records.filter(r => r.date === ds && r.type === 'body' && !r.isCustom); return dayRecs.length > 0 ? Math.max(...dayRecs.flatMap(dr => dr.sensationData.map(s => parseInt(s.intensity)))) : 0; });
            createLineChart('chart-body-trend', dailyMax, '#C8A882');
            const moodAvg = Array.from({length: 31}, (_, i) => { const ds = `${month}-${String(i+1).padStart(2, '0')}`; const dayRecs = records.filter(r => r.date === ds && r.type === 'mood'); if(dayRecs.length === 0) return 0; const vals = dayRecs.flatMap(dr => Object.values(dr.moods).map(v => parseInt(v))); return vals.reduce((a,b)=>a+b,0) / vals.length; });
            createLineChart('chart-mood-trend', moodAvg, '#D1C4B9', '#D1C4B922');
            const labEff = Array.from({length: 31}, (_, i) => { const ds = `${month}-${String(i+1).padStart(2, '0')}`; const dayRecs = records.filter(r => r.date === ds && r.lab); if(dayRecs.length === 0) return 0; const vals = dayRecs.map(r => parseInt(r.lab.effect)); return vals.reduce((a,b)=>a+b,0) / vals.length; });
            const ctxLab = document.getElementById('chart-lab-trend'); if(ctxLab) { const old = Chart.getChart(ctxLab); if(old) old.destroy(); new Chart(ctxLab, { type: 'bar', data: { labels: Array.from({length:31},(_,i)=>i+1), datasets: [{ data: labEff, backgroundColor: '#F3E5D8', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, min: 0, max: 100 }, x: { grid: { display: false }, ticks: { color: '#D1C4B9', font: { size: 8 } } } } } }); }
            CATEGORIES.forEach(cat => { const canvas = document.getElementById(`chart-${cat}`); if (!canvas) return; const old = Chart.getChart(canvas); if(old) old.destroy(); const filtered = records.filter(r => r.area === cat && r.date.startsWith(month)).flatMap(r => r.sensationData.map(s => s.label)); const counts = filtered.reduce((a, b) => { a[b] = (a[b] || 0) + 1; return a; }, {}); new Chart(canvas, { type: 'bar', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: '#C8A882' }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#C8A882', font: { size: 10 } } }, y: { grid: { display: false }, ticks: { color: '#C8A882', font: { size: 10 } } } } } }); });
        }, [records, month]);
        return (<div className="p-8 space-y-12 animate-fade-in pb-32 text-left"><header className="pt-4 flex justify-between items-end text-[#C8A882] uppercase tracking-[0.2em] font-medium font-sans font-medium"><h2 className="text-2xl">Monthly Trends</h2><Icon.Trend /></header><div className="flex justify-center border-b border-[#F3E5D8] pb-4"><input type="month" value={month} onChange={e => setMonth(e.target.value)} className="bg-transparent text-sm font-medium uppercase tracking-widest text-[#C8A882] outline-none" /></div>
            <section className="space-y-6 text-left"><h3 className="text-sm font-medium text-[#C8A882] tracking-[0.2em] uppercase ml-1">身體覺察 (不適指數 MAX)</h3><div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-56 shadow-sm"><canvas id="chart-body-trend"></canvas></div></section>
            <section className="space-y-6 text-left"><h3 className="text-sm font-medium text-[#C8A882] tracking-[0.2em] uppercase ml-1">心情能量 (平均基調 AVG)</h3><div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-56 shadow-sm"><canvas id="chart-mood-trend"></canvas></div></section>
            <section className="space-y-6 text-left"><h3 className="text-sm font-medium text-[#C8A882] tracking-[0.2em] uppercase ml-1">實驗對策 (平均緩解率 EFF)</h3><div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-56 shadow-sm"><canvas id="chart-lab-trend"></canvas></div></section>
            <section className="space-y-10 pt-10 border-t border-[#F3E5D8] text-left text-left"><h2 className="text-xl font-light text-[#C8A882] tracking-[0.3em] uppercase text-center italic font-medium tracking-widest font-medium uppercase">局部頻率統計</h2>{["頭部", "頸部", "手部", "胸腹", "背腰部", "腿部"].map(cat => (<div key={cat} className="space-y-4"><h3 className="text-[13px] font-medium text-[#C8A882] tracking-widest uppercase ml-1">— {cat} 感受頻率</h3><div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-48 shadow-sm transition-all hover:bg-[#F3E5D8]/5 shadow-sm transition-all text-left"><canvas id={`chart-${cat}`}></canvas></div></div>))}</section>
        </div>);
    }

    function MiniLab({ records, setRecords }) {
        const [expId, setExpId] = useState(null);
        const [lab, setLab] = useState({ action: '', effect: 50 });
        const labRecords = records.filter(r => r.type !== 'diary');
        const saveLab = () => { setRecords(records.map(r => r.id === expId ? { ...r, lab } : r)); setExpId(null); setLab({ action: '', effect: 50 }); };
        return (<div className="p-8 space-y-10 animate-fade-in pb-32 text-left"><header className="pt-4 flex justify-between items-end text-[#C8A882] uppercase tracking-[0.2em] font-medium font-sans font-medium tracking-widest"><h2 className="text-2xl font-medium uppercase tracking-[0.1em]">Mini Lab</h2><Icon.Lab /></header><div className="space-y-6">{labRecords.map(r => (
            <div key={r.id} className="p-8 border border-[#F3E5D8] rounded-[2.5rem] space-y-6 bg-white shadow-sm transition-all hover:bg-[#F3E5D8]/5 shadow-sm transition-all text-left"><div className="flex justify-between items-start text-left"><div className="space-y-1 text-left"><span className="text-[9px] font-medium text-[#D1C4B9] uppercase tracking-tighter">{r.date} · {r.timeSlot}</span><h3 className="text-sm font-medium text-[#C8A882] leading-snug tracking-wide text-left">{r.type === 'body' ? `${r.side?r.side.join(''):''}${r.part} - ${r.sensationData[0].label}` : Object.keys(r.moods).join(', ')}</h3></div>{!r.lab && <button onClick={() => setExpId(r.id)} className="text-[9px] font-normal text-[#C8A882] border border-[#C8A882]/40 px-4 py-1.5 rounded-full hover:bg-[#C8A882] hover:text-white transition-all font-medium font-light">+ 實驗</button>}</div>
                {r.bodyLanguage && <div className="px-4 py-3 bg-[#FAF7F4] rounded-2xl border border-[#F3E5D8] animate-fade-in text-left"><p className="text-[10px] text-[#D1C4B9] uppercase font-light tracking-widest mb-1">身體語言</p><p className="text-xs font-light italic leading-relaxed text-[#8D7B6D] text-left">"{r.bodyLanguage}"</p></div>}
                {r.lab && <div className="p-6 bg-[#F3E5D8]/20 border border-[#F3E5D8] rounded-[1.5rem] animate-fade-in font-medium text-left"><p className="text-xs text-[#C8A882] leading-relaxed tracking-wide font-medium text-left">對策：{r.lab.action}</p><div className="flex items-center gap-3 mt-4 text-left"><div className="flex-1 h-3 bg-white border border-[#C8A882]/40 rounded-full overflow-hidden shadow-sm"><div className="h-full bg-[#C8A882] transition-all duration-700" style={{ width: `${r.lab.effect}%` }}></div></div><span className="text-[10px] font-medium text-[#C8A882] border border-[#C8A882]/40 px-2 py-0.5 rounded-full bg-white/80">{r.lab.effect}% 有效</span></div></div>}
                {expId === r.id && (<div className="pt-6 border-t border-dashed border-[#F3E5D8] space-y-5 animate-slide-up text-left"><textarea value={lab.action} onChange={e => setLab({...lab, action: e.target.value})} placeholder="你嘗試了什麼對策，如：伸展、休息、吃藥等)" className="w-full bg-[#F3E5D8]/10 p-5 rounded-2xl text-sm outline-none h-24 placeholder-[#D1C4B9] font-medium border-none" /><div className="space-y-2 text-left"><div className="flex justify-between text-[11px] font-medium text-[#C8A882] uppercase tracking-widest font-medium text-left"><span>緩解程度</span><span>{lab.effect}%</span></div><input type="range" className="w-full" value={lab.effect} onChange={e => setLab({...lab, effect: e.target.value})} /></div><div className="flex gap-4 pt-2 text-left"><button onClick={() => setExpId(null)} className="flex-1 text-xs text-[#D1C4B9] underline font-medium uppercase font-light">取消</button><button onClick={saveLab} className="flex-[2.5] py-4 bg-[#C8A882] text-white rounded-2xl text-xs font-medium tracking-[0.2em] transition-transform active:scale-95 shadow-lg shadow-[#C8A882]/20 uppercase">紀錄對策</button></div></div>)}
            </div>))}</div></div>);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
