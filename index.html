<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BodyPath">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#C8A882">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BodyPath - 純粹覺察</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        :root {
            --ancient-gold: #C8A882;
            --light-beige: #D1C4B9;
            --white: #FFFFFF;
            --danger-muted: #8D7B6D;
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8f8f8; 
            color: var(--ancient-gold); 
            font-weight: 300;
            margin: 0;
            padding: 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="range"] { accent-color: var(--ancient-gold); }
        input[type="date"] { border: none; background: transparent; font-family: inherit; color: var(--ancient-gold); text-align: center; font-size: 1.1rem; font-weight: 500; outline: none; width: 100%; }
        
        .app-container {
            width: 100%;
            max-width: 430px;
            background-color: var(--white);
            min-height: 100vh;
            position: relative;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #F3E5D8;
            border-right: 1px solid #F3E5D8;
            box-sizing: border-box;
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .record-modal { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        * { box-shadow: none !important; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = {
        Home: () => <svg className="w-7 h-7" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75" /></svg>,
        Body: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>,
        Mood: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>,
        Diary: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18c-2.305 0-4.408.867-6 2.292m0-14.25v14.25" /></svg>,
        Lab: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M9 3h6M10 3v12a2 2 0 002 2 2 2 0 002-2V3M9 19h6" /></svg>,
        Trend: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>,
        Calendar: () => <svg className="w-6 h-6" fill="none" stroke="#C8A882" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
    };

    const TIME_SLOTS = ["凌晨", "上午", "下午", "晚上", "半夜", "自定義"];
    const BODY_STRUCTURE = {
        "頭部": ["眼", "耳", "鼻", "口", "額頭", "太陽穴", "臉頰", "下巴", "頭頂", "頭側", "後腦杓"],
        "頸部": ["喉嚨", "頸部正面", "頸部側面", "後頸"],
        "手部": ["肩", "上手臂", "手肘", "下手臂", "手腕", "手指"],
        "胸腹": ["鎖骨", "上胸", "胸部", "上腹(胃)", "肚臍", "下腹", "私密處"],
        "背腰部": ["肩胛骨", "上背", "後腰", "下背", "臀部"],
        "腿部": ["大腿", "膝蓋", "小腿", "腳踝", "腳背", "腳掌"]
    };

    const SENSATION_GROUPS = [
        { title: "壓力的信使", desc: "這是現代人最常見的感受，通常與肌肉的長期收縮有關。", items: [{ label: "緊繃", sub: "像是一根拉太緊的琴弦，無法放鬆。" }, { label: "僵硬", sub: "像關節被膠水黏住，活動度受限。" }, { label: "沉重", sub: "感覺四肢像灌了鉛，或是肩膀上坐著一個人。" }, { label: "壓迫感", sub: "像是胸口壓著石頭，或是頭部被緊緊箍住。" }] },
        { title: "神經的共鳴", desc: "這些感受通常比較尖銳或帶有電子感，指向神經系統的反應。", items: [{ label: "麻木", sub: "失去觸感，像是肢體「睡著了」。" }, { label: "發麻", sub: "像是有小螞蟻在皮膚上爬，或是微小的電流感。" }, { label: "刺痛", sub: "像被細針輕輕扎到。" }, { label: "抽痛", sub: "隨著心跳節奏一跳一跳的疼痛。" }] },
        { title: "流動與能量", desc: "這些感受與血液循環或代謝有關。", items: [{ label: "發熱", sub: "某個部位燙燙的，或是內在的一團火。" }, { label: "冰冷", sub: "即使環境溫暖，手腳依然像冰塊。" }, { label: "腫脹", sub: "感覺皮膚被撐開，或是腹部充滿氣體。" }, { label: "虛弱", sub: "胃部或胸口有一種空空、虛弱的感覺。" }] },
        { title: "質感的異樣", desc: "這些是比較難以言喻、具有特定物理質感的感受。", items: [{ label: "痠", sub: "運動後或疲勞累積的深層疲軟感。" }, { label: "癢", sub: "內在或表皮的騷動。" }, { label: "緊縮", sub: "喉嚨或胃部像被一隻手握住。" }, { label: "震動", sub: "內在極細微的顫抖。" }] },
        { title: "節奏的失衡", desc: "能量與節奏感的紊亂。", items: [{ label: "悶", sub: "呼吸不順暢，或是空間感變窄。" }, { label: "虛脫", sub: "全身沒力氣，像是電力耗盡。" }, { label: "緊繃抽動", sub: "眼皮或肌肉不自覺地跳動。" }] }
    ];

    const MOOD_GROUPS = [
        { title: "向內凝聚", desc: "想要安靜、縮小、保護、沉思", items: [{ label: "平靜", sub: "內心像無風的湖面，不需要特別做什麼。" }, { label: "憂鬱", sub: "像沉入深水，安靜但帶有一種沉重的重量感。" }, { label: "疲累", sub: "電力即將耗盡，只想安靜地待在角落休息。" }, { label: "清澈", sub: "看事情變得很透明，能清楚感知當下的存在。" }, { label: "孤獨", sub: "像獨自在空曠的房間，感覺與外界有一層薄薄的隔閡。" }] },
        { title: "向外擴張", desc: "想要連結、分享、表達、行動", items: [{ label: "喜悅", sub: "內心有微微的暖意在擴散，想分享這份輕盈。" }, { label: "好奇", sub: "像伸出了觸角，對周遭的小事產生了興趣。" }, { label: "憤怒", sub: "像一團燃燒的火，有一股想衝破現狀的力道。" }, { label: "期待", sub: "心跳輕快，像在等待一份即將打開的禮物。" }, { label: "自信", sub: "感覺腳步很紮實，相信自己有能力承接當下。" }] },
        { title: "起伏波動", desc: "感覺不穩定、混亂", items: [{ label: "焦慮", sub: "像快轉的發條，停不下來卻又不知道往哪去。" }, { label: "困惑", sub: "像走進一場大霧，找不到前進或後退的方向。" }, { label: "矛盾", sub: "內心有兩股力量在拉扯，難以決定落腳點。" }, { label: "多愁善感", sub: "情緒像潮汐頻繁起伏，容易被微小的事物觸動。" }, { label: "麻木", sub: "像隔了一層玻璃看世界，感覺不到冷熱與起伏。" }] }
    ];

    function App() {
        const [tab, setTab] = useState('home');
        const [prevTab, setPrevTab] = useState('home');
        const [records, setRecords] = useState(JSON.parse(localStorage.getItem('bp_v25_all') || '[]'));
        const [selectedDetail, setSelectedDetail] = useState(null);
        const [detailClickY, setDetailClickY] = useState(null);

        const switchTab = (newTab) => {
            setPrevTab(tab);
            setTab(newTab);
            const main = document.querySelector('main');
            if (main) main.scrollTop = 0;
        };

        const openDetail = (record, e) => {
            if (e) {
                const container = document.querySelector('.app-container');
                const rect = container ? container.getBoundingClientRect() : { top: 0, height: window.innerHeight };
                const relY = ((e.clientY - rect.top) / rect.height) * 100;
                setDetailClickY(relY);
            }
            setSelectedDetail(record);
        };

        useEffect(() => { localStorage.setItem('bp_v25_all', JSON.stringify(records)); }, [records]);

        const addRecord = (r) => {
            const newList = [{ ...r, id: Date.now() }, ...records];
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            // Go back to where we came from
            if (tab === 'body_rec') switchTab(prevTab === 'body' ? 'body' : 'home');
            else if (tab === 'mood_rec') switchTab(prevTab === 'mood' ? 'mood' : 'home');
            else if (tab === 'diary_rec') switchTab(prevTab === 'diary' ? 'diary' : 'home');
            else switchTab('home');
        };

        const updateRecord = (updatedR) => {
            const newList = records.map(r => r.id === updatedR.id ? updatedR : r);
            newList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(newList);
            setSelectedDetail(null);
        };

        const deleteRecord = (id) => {
            if(window.confirm("確定要刪除這筆覺察紀錄嗎？")) {
                setRecords(records.filter(r => r.id !== id));
                setSelectedDetail(null);
            }
        };

        return (
            <div className="flex justify-center min-h-screen bg-[#f8f8f8]">
                <div className="app-container shadow-2xl">
                    <main className="flex-1 overflow-y-auto no-scrollbar pb-24">
                        {tab === 'home' && <HomePage switchTab={switchTab} records={records} onDetail={openDetail} />}
                        
                        {tab === 'body' && <CategoryLog records={records} type="body" onBack={() => switchTab('home')} onDetail={openDetail} onAdd={() => switchTab('body_rec')} />}
                        {tab === 'mood' && <CategoryLog records={records} type="mood" onBack={() => switchTab('home')} onDetail={openDetail} onAdd={() => switchTab('mood_rec')} />}
                        {tab === 'diary' && <CategoryLog records={records} type="diary" onBack={() => switchTab('home')} onDetail={openDetail} onAdd={() => switchTab('diary_rec')} />}
                        {tab === 'body_rec' && <BodyRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'body' ? 'body' : 'home')} />}
                        {tab === 'mood_rec' && <MoodRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'mood' ? 'mood' : 'home')} />}
                        {tab === 'diary_rec' && <DiaryRecorder onSave={addRecord} onCancel={() => switchTab(prevTab === 'diary' ? 'diary' : 'home')} />}
                        {tab === 'lab' && <MiniLab records={records} setRecords={setRecords} onDetail={openDetail} />}
                        {tab === 'calendar' && <CalendarPage records={records} setRecords={setRecords} onDetail={openDetail} />}
                        {tab === 'trend' && <TrendPage records={records} />}
                    </main>

                    {selectedDetail && <DetailModal record={selectedDetail} clickY={detailClickY} onClose={() => setSelectedDetail(null)} onUpdate={updateRecord} onDelete={deleteRecord} />}

                    <nav className="fixed bottom-0 w-full max-w-[428px] h-20 bg-white border-t border-[#F3E5D8] flex items-center justify-around px-2 z-50">
                        <NavBtn active={tab === 'home'} onClick={() => switchTab('home')} label="首頁" icon={<Icon.Home />} />
                        <NavBtn active={tab === 'body'} onClick={() => switchTab('body')} label="身體" icon={<Icon.Body />} />
                        <NavBtn active={tab === 'mood'} onClick={() => switchTab('mood')} label="心情" icon={<Icon.Mood />} />
                        <NavBtn active={tab === 'diary'} onClick={() => switchTab('diary')} label="日記" icon={<Icon.Diary />} />
                        <NavBtn active={tab === 'lab'} onClick={() => switchTab('lab')} label="調頻" icon={<Icon.Calendar />} />
                    </nav>
                </div>
            </div>
        );
    }

    function NavBtn({ icon, label, active, onClick }) {
        return (
            <button onClick={onClick} className={`flex flex-col items-center gap-1 flex-1 transition-all ${active ? 'opacity-100 scale-105 font-medium' : 'opacity-30'}`}>
                {icon}
                <span className="text-[13px] font-medium tracking-tighter text-[#C8A882]">{label}</span>
            </button>
        );
    }

    // 部位顯示格式
    function bodyLabel(r) {
        return `${r.area ? r.area + ' · ' : ''}${r.side ? r.side.join('') : ''}${r.part} : ${r.sensationData.map(s => s.label).join(', ')}`;
    }

    // --- 詳情 Modal ---
    function DetailModal({ record, onClose, onUpdate, onDelete, clickY }) {
        const [isEditing, setIsEditing] = useState(false);
        const [edited, setEdited] = useState({...record});
        const cnType = record.type === 'body' ? '身體覺察' : record.type === 'mood' ? '心情能量' : '日記隨想';

        // 計算 modal 頂部位置：以點擊位置為起點，但確保不超出畫面
        const topPct = clickY ? Math.min(Math.max(clickY - 20, 5), 60) : 10;

        return (
            <div className="fixed inset-0 z-[100] animate-fade-in flex items-center justify-center px-6" onClick={onClose}>
                <div className="fixed inset-0 bg-[#C8A882]/10 backdrop-blur-sm" />
                <div
                    className="relative w-full bg-white rounded-[3rem] p-8 space-y-5 border border-[#F3E5D8] max-h-[85vh] overflow-y-auto no-scrollbar"
                    onClick={e => e.stopPropagation()}
                >
                    {/* Header: 日期時段 + 刪除編輯 同一行 */}
                    <div className="flex justify-between items-center pt-1">
                        <div className="flex items-baseline gap-2">
                            {isEditing ? (
                                <div className="space-y-2">
                                    <input type="date" className="block text-base font-medium" value={edited.date} onChange={e => setEdited({...edited, date: e.target.value})} />
                                    <div className="flex flex-wrap gap-1.5">
                                        {['凌晨','上午','下午','晚上','半夜'].map(slot => (
                                            <button key={slot} onClick={() => setEdited({...edited, timeSlot: slot})} className={`px-3 py-1 rounded-full text-xs font-medium border transition-all ${edited.timeSlot === slot ? 'bg-[#C8A882] text-white border-[#C8A882]' : 'text-[#C8A882] border-[#F3E5D8]'}`}>{slot}</button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <h2 className="text-lg font-medium text-[#D1C4B9] tracking-wide whitespace-nowrap">{record.date}</h2>
                                    <span className="text-xs text-[#D1C4B9] font-medium">{record.timeSlot}</span>
                                </>
                            )}
                        </div>
                        {!isEditing && (
                            <div className="flex items-center gap-2 shrink-0 ml-3">
                                <button onClick={() => onDelete(record.id)} className="px-3 py-1.5 bg-[#8D7B6D] text-white rounded-full text-xs font-medium tracking-wide">刪除</button>
                                <button onClick={() => setIsEditing(true)} className="px-3 py-1.5 border border-[#C8A882] rounded-full text-xs font-medium tracking-wide text-[#C8A882]">編輯</button>
                            </div>
                        )}
                    </div>

                    <div className="space-y-4">
                        {/* 身體覺察內容 */}
                        {record.type === 'body' && (
                            <div className="space-y-4">
                                <p className="text-lg font-medium text-[#8D7B6D] tracking-wide leading-snug">{edited.area ? edited.area + ' · ' : ''}{edited.side ? edited.side.join(' ') : ''} {record.part}</p>
                                <div className="space-y-2">
                                    {edited.sensationData.map((s, idx) => (
                                        <div key={idx} className="space-y-2 bg-[#FAF7F4] p-4 rounded-2xl border border-[#F3E5D8]">
                                            {isEditing ? (
                                                <div className="space-y-2">
                                                    <input value={s.label} onChange={e => { const nd = [...edited.sensationData]; nd[idx] = {...nd[idx], label: e.target.value}; setEdited({...edited, sensationData: nd}); }} className="w-full bg-white p-2 rounded-xl text-sm font-medium text-[#C8A882] border border-[#F3E5D8] outline-none focus:border-[#C8A882]" />
                                                    <div className="flex items-center gap-2">
                                                        <input type="range" className="flex-1" value={s.intensity} onChange={e => { const nd = [...edited.sensationData]; nd[idx] = {...nd[idx], intensity: parseInt(e.target.value)}; setEdited({...edited, sensationData: nd}); }} />
                                                        <span className="text-xs text-[#D1C4B9] w-10 text-right">{s.intensity}%</span>
                                                        <button onClick={() => setEdited({...edited, sensationData: edited.sensationData.filter((_,i) => i!==idx)})} className="text-xs text-[#A89080] px-2 py-1 rounded-full border border-[#F3E5D8]">✕</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex justify-between text-sm font-medium tracking-wide"><span className="text-[#C8A882]">{s.label}</span><span className="text-[#D1C4B9]">{s.intensity}%</span></div>
                                            )}
                                        </div>
                                    ))}
                                    {isEditing && (
                                        <button onClick={() => setEdited({...edited, sensationData: [...edited.sensationData, {label: '新感受', intensity: 50}]})} className="w-full py-2.5 text-xs text-[#C8A882] border border-dashed border-[#C8A882]/40 rounded-2xl tracking-wide">+ 新增感受</button>
                                    )}
                                </div>
                                <div className="border-t border-[#F3E5D8]"></div>
                            </div>
                        )}

                        {/* 心情能量內容 */}
                        {record.type === 'mood' && (
                            <div className="space-y-4">
                                <div className="space-y-2">
                                    {Object.entries(edited.moods).map(([m,v], idx) => (
                                        <div key={m} className="space-y-2 bg-[#FAF7F4] p-4 rounded-2xl border border-[#F3E5D8]">
                                            {isEditing ? (
                                                <div className="space-y-2">
                                                    <input value={m} onChange={e => {
                                                        const entries = Object.entries(edited.moods);
                                                        entries[idx][0] = e.target.value;
                                                        setEdited({...edited, moods: Object.fromEntries(entries)});
                                                    }} className="w-full bg-white p-2 rounded-xl text-sm font-medium text-[#C8A882] border border-[#F3E5D8] outline-none focus:border-[#C8A882]" />
                                                    <div className="flex items-center gap-2">
                                                        <input type="range" className="flex-1" value={v} onChange={e => setEdited({...edited, moods: {...edited.moods, [m]: e.target.value}})} />
                                                        <span className="text-xs text-[#D1C4B9] w-10 text-right">{v}%</span>
                                                        <button onClick={() => { const n = {...edited.moods}; delete n[m]; setEdited({...edited, moods: n}); }} className="text-xs text-[#A89080] px-2 py-1 rounded-full border border-[#F3E5D8]">✕</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex justify-between text-sm font-medium tracking-wide"><span className="text-[#C8A882]">{m}</span><span className="text-[#D1C4B9]">{v}%</span></div>
                                            )}
                                        </div>
                                    ))}
                                    {isEditing && (
                                        <button onClick={() => setEdited({...edited, moods: {...edited.moods, ['新心情']: 50}})} className="w-full py-2.5 text-xs text-[#C8A882] border border-dashed border-[#C8A882]/40 rounded-2xl tracking-wide">+ 新增心情</button>
                                    )}
                                </div>
                                <div className="border-t border-[#F3E5D8]"></div>
                            </div>
                        )}

                        {/* 日記內容 */}
                        {record.type === 'diary' && (() => {
                            const FIELD_LABELS = { f1: '環境的質地', f2: '留白時刻', f3: '對自己的新發現', f4: '內在的呼喚', f5: '溫柔回應內在呼喚', f6: '最深刻的一抹色彩' };
                            const df = record.diaryFields || {};
                            return (
                                <div className="space-y-4">
                                    {Object.entries(FIELD_LABELS).map(([k, label]) => {
                                        const val = df[k];
                                        if (!val && !isEditing) return null;
                                        return (
                                            <div key={k} className="space-y-3">
                                                <p className="text-sm font-medium text-[#8D7B6D] tracking-wide">{label}</p>
                                                <div className="bg-[#FAF7F4] p-5 rounded-[2rem] border border-[#F3E5D8]">
                                                    {isEditing
                                                        ? <textarea value={edited.diaryFields?.[k] || ''} onChange={e => setEdited({...edited, diaryFields: {...(edited.diaryFields||{}), [k]: e.target.value}})} className="w-full bg-transparent text-sm border-none outline-none font-medium text-[#C8A882] h-20 leading-relaxed resize-none" />
                                                        : <p className="text-sm font-medium text-[#C8A882] leading-relaxed tracking-wide">{val || '未紀錄'}</p>
                                                    }
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {/* legacy fields */}
                                    {!record.diaryFields && record.sentence && (
                                        <div className="space-y-3">
                                            <p className="text-sm font-medium text-[#8D7B6D] tracking-wide">對自己的新發現</p>
                                            <div className="bg-[#FAF7F4] p-5 rounded-[2rem] border border-[#F3E5D8]">
                                                <p className="text-sm font-medium text-[#C8A882] leading-relaxed tracking-wide">{record.sentence}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })()}

                        {/* 身體想告訴我... */}
                        {record.type !== 'diary' && (
                            <div className="space-y-3">
                                <p className="text-sm font-medium text-[#A89080] tracking-wide">身體想告訴我...</p>
                                <div className="bg-[#FAF7F4] p-5 rounded-[2rem] border border-[#F3E5D8]">
                                    {isEditing ? (
                                        <textarea value={edited.bodyLanguage} onChange={e => setEdited({...edited, bodyLanguage: e.target.value})} className="w-full bg-transparent text-sm border-none outline-none font-medium text-[#C8A882] h-20 leading-relaxed" />
                                    ) : (
                                        <p className="text-sm font-medium text-[#C8A882] leading-relaxed tracking-wide">{record.bodyLanguage || "未紀錄"}</p>
                                    )}
                                </div>
                            </div>
                        )}
                        {/* 我的真實感受是... */}
                        {record.type !== 'diary' && (
                            <div className="space-y-3">
                                <p className="text-sm font-medium text-[#A89080] tracking-wide">我的真實感受是...</p>
                                <div className="bg-[#FAF7F4] p-5 rounded-[2rem] border border-[#F3E5D8]">
                                    {isEditing ? (
                                        <textarea value={edited.trueFeeling || ''} onChange={e => setEdited({...edited, trueFeeling: e.target.value})} className="w-full bg-transparent text-sm border-none outline-none font-medium text-[#C8A882] h-20 leading-relaxed" />
                                    ) : (
                                        <p className="text-sm font-medium text-[#C8A882] leading-relaxed tracking-wide">{record.trueFeeling || "未紀錄"}</p>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {isEditing ? (
                        <div className="flex gap-4 pt-2">
                            <button onClick={() => setIsEditing(false)} className="flex-1 py-3 text-[#A89080] font-medium text-sm uppercase tracking-widest">取消</button>
                            <button onClick={() => {onUpdate(edited); setIsEditing(false);}} className="flex-[2] py-3 bg-[#C8A882] text-white rounded-2xl font-medium tracking-widest transition-transform active:scale-95">儲存修改</button>
                        </div>
                    ) : (
                        <button onClick={onClose} className="w-full py-4 bg-[#C8A882] text-white rounded-2xl font-medium tracking-widest uppercase transition-transform active:scale-95">關閉</button>
                    )}
                </div>
            </div>
        );
    }

    function HomePage({ switchTab, records, onDetail }) {
        const sections = [{ type: 'body', label: '身體覺察' }, { type: 'mood', label: '心情能量' }, { type: 'diary', label: '日記隨想' }];
        const [menuOpen, setMenuOpen] = useState(false);

        const exportJSON = () => {
            const data = localStorage.getItem('bp_v25_all') || '[]';
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `BodyPath_備份_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            setMenuOpen(false);
        };

        const importJSON = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (!Array.isArray(parsed)) throw new Error();
                        if (window.confirm(`即將匯入 ${parsed.length} 筆紀錄，這會覆蓋目前所有資料，確定嗎？`)) {
                            localStorage.setItem('bp_v25_all', JSON.stringify(parsed));
                            window.location.reload();
                        }
                    } catch(err) {
                        alert('檔案格式錯誤，請選擇 BodyPath 匯出的 .json 檔案');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
            setMenuOpen(false);
        };

        // 動態 Insight 根據近一週資料
        const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
        const weekRecords = records.filter(r => new Date(r.date) >= oneWeekAgo);
        const bodyCount = weekRecords.filter(r => r.type === 'body').length;
        const moodCount = weekRecords.filter(r => r.type === 'mood').length;
        const diaryCount = weekRecords.filter(r => r.type === 'diary').length;
        const totalCount = weekRecords.length;

        const getInsight = () => {
            if (totalCount === 0) return '每一天都值得被溫柔記錄。\n輕輕觸碰下方，開始今天的覺察。';
            if (bodyCount >= 5) return `這週身體傳來了 ${bodyCount} 次訊息。\n試著在每次不適前先深呼吸，聽聽它想說什麼。`;
            if (moodCount >= 5) return `這週你記錄了 ${moodCount} 次心情起伏。\n情緒流動是正常的，你已經在好好感受了。`;
            if (diaryCount >= 3) return `你已經連續書寫了 ${diaryCount} 次日記。\n這種與自己對話的習慣，會慢慢帶來清晰。`;
            if (totalCount >= 3) return `這週已經有 ${totalCount} 筆覺察。\n持續記錄，你會越來越了解自己的節律。`;
            return '今天也要好好照顧自己。\n身體和心情，都值得被看見。';
        };

        const entries = [
            {
                type: 'body_rec',
                label: '身體覺察',
                desc: '記錄不適的位置與感受',
                icon: <Icon.Body />,
                count: records.filter(r => r.type === 'body').length,
            },
            {
                type: 'mood_rec',
                label: '心情能量',
                desc: '記錄當下的情緒狀態',
                icon: (
                    <svg className="w-7 h-7" fill="none" stroke="#C8A882" strokeWidth="1.3" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                    </svg>
                ),
                count: records.filter(r => r.type === 'mood').length,
            },
            {
                type: 'diary_rec',
                label: '日記隨想',
                desc: '寫下今天想對自己說的話',
                icon: (
                    <svg className="w-7 h-7" fill="none" stroke="#C8A882" strokeWidth="1.3" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                    </svg>
                ),
                count: records.filter(r => r.type === 'diary').length,
            },
        ];

        return (
            <div className="p-8 space-y-8 animate-fade-in pb-10">
                <header className="pt-4 flex justify-between items-center">
                    <div>
                        <h1 className="text-2xl font-light text-[#C8A882] tracking-[0.3em]">BodyPath</h1>
                        <p className="text-[10px] text-[#D1C4B9] mt-2 tracking-[0.2em] uppercase font-medium">Listening to Life</p>
                    </div>
                    <div className="relative">
                        <button onClick={() => setMenuOpen(o => !o)} className="p-2 border border-[#F3E5D8] rounded-full active:bg-[#F3E5D8]/20 transition-all flex flex-col gap-[4px] items-center justify-center w-10 h-10">
                            <span className="block w-4 h-[1.5px] bg-[#C8A882] rounded-full"></span>
                            <span className="block w-4 h-[1.5px] bg-[#C8A882] rounded-full"></span>
                            <span className="block w-4 h-[1.5px] bg-[#C8A882] rounded-full"></span>
                        </button>
                        {menuOpen && (
                            <div className="absolute right-0 top-12 w-44 bg-white border border-[#F3E5D8] rounded-[1.5rem] shadow-lg overflow-hidden z-50 animate-fade-in">
                                <button onClick={() => { switchTab('trend'); setMenuOpen(false); }} className="w-full px-5 py-3.5 text-left text-sm text-[#A89080] tracking-wide flex items-center gap-3 active:bg-[#FAF7F4]">
                                    <Icon.Trend /> 趨勢圖
                                </button>
                                <div className="h-px bg-[#F3E5D8] mx-4"></div>
                                <button onClick={exportJSON} className="w-full px-5 py-3.5 text-left text-sm text-[#A89080] tracking-wide flex items-center gap-3 active:bg-[#FAF7F4]">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                                    備份資料
                                </button>
                                <div className="h-px bg-[#F3E5D8] mx-4"></div>
                                <button onClick={importJSON} className="w-full px-5 py-3.5 text-left text-sm text-[#A89080] tracking-wide flex items-center gap-3 active:bg-[#FAF7F4]">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" transform="rotate(180 12 12)" /></svg>
                                    還原資料
                                </button>
                            </div>
                        )}
                        {menuOpen && <div className="fixed inset-0 z-40" onClick={() => setMenuOpen(false)}></div>}
                    </div>
                </header>

                {/* Insight 區塊 */}
                <div className="p-6 bg-[#F3E5D8]/30 rounded-[2.5rem] border border-[#F3E5D8]">
                    <p className="text-sm text-[#C8A882]/80 leading-relaxed font-medium whitespace-pre-line text-center">{getInsight()}</p>
                </div>

                {/* 三個記錄入口 */}
                <div className="space-y-3">
                    {entries.map(e => (
                        <button key={e.type} onClick={() => switchTab(e.type)}
                            className="w-full flex items-center gap-5 p-5 bg-white border border-[#F3E5D8] rounded-[2rem] active:bg-[#F3E5D8]/30 transition-all text-left">
                            <div className="w-12 h-12 rounded-2xl bg-[#F3E5D8]/60 flex items-center justify-center shrink-0">
                                {e.icon}
                            </div>
                            <div className="flex-1 min-w-0">
                                <p className="text-sm font-medium text-[#C8A882] tracking-wide">{e.label}</p>
                                <p className="text-xs text-[#A89080] mt-0.5 tracking-wide">{e.desc}</p>
                            </div>
                            <div className="text-right shrink-0">
                                <p className="text-lg font-light text-[#C8A882]">{e.count}</p>
                                <p className="text-[10px] text-[#A89080] tracking-widest uppercase">筆</p>
                            </div>
                        </button>
                    ))}
                </div>
            </div>
        );
    }

    function CategoryLog({ records, type, onBack, onDetail, onAdd }) {
        const filtered = records.filter(r => r.type === type);
        const mapTitle = { body: '身體覺察', mood: '心情能量', diary: '日記隨想' };
        const mapIcon = { body: <Icon.Body />, mood: <Icon.Mood />, diary: <Icon.Diary /> };
        return (
            <div className="p-8 animate-fade-in space-y-6 pb-32">
                <header className="pt-4 flex justify-between items-center">
                    <div className="flex items-center gap-3">
                        {mapIcon[type]}
                        <h2 className="text-2xl font-light text-[#C8A882] tracking-[0.3em] uppercase">{mapTitle[type]}</h2>
                    </div>
                    <button onClick={onAdd} className="px-4 py-2 bg-[#C8A882] text-white rounded-full text-xs font-medium tracking-widest transition-transform active:scale-95">+ 新增</button>
                </header>
                {filtered.length === 0 && (
                    <div className="text-center py-20 space-y-4">
                        <p className="text-xs text-[#D1C4B9] uppercase font-medium tracking-widest">Gently Left Blank.</p>
                        <button onClick={onAdd} className="text-xs text-[#C8A882] border border-[#C8A882]/40 px-5 py-2.5 rounded-full font-medium tracking-wide">開始第一筆記錄</button>
                    </div>
                )}
                <div className="space-y-4">
                    {filtered.map(r => (
                        <div key={r.id} onClick={(e) => onDetail(r, e)} className="p-6 border border-[#F3E5D8] rounded-[2rem] bg-white cursor-pointer active:bg-[#F3E5D8]/10 transition-all space-y-3">
                            <span className="text-xs font-medium text-[#D1C4B9] uppercase tracking-widest">{r.date} · {r.timeSlot}</span>
                            {r.type === 'body' ? (
                                <div className="space-y-3">
                                    <p className="text-sm font-medium text-[#C8A882] tracking-wide">{r.area ? r.area + ' · ' : ''}{r.side?r.side.join(''):''}{r.part}</p>
                                    {(r.sensationData||[]).length > 0 && (
                                        <div className="flex flex-wrap gap-1.5 pt-3 border-t border-[#F3E5D8]">
                                            {(r.sensationData||[]).map((s,i) => (
                                                <span key={i} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{s.label} {s.intensity}%</span>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ) : r.type === 'mood' ? (
                                <div className="space-y-3">
                                    <p className="text-sm font-medium text-[#C8A882] tracking-wide">{Object.keys(r.moods||{}).slice(0,2).join(' · ')}{Object.keys(r.moods||{}).length > 2 ? ' ...' : ''}</p>
                                    <div className="flex flex-wrap gap-1.5 pt-3 border-t border-[#F3E5D8]">
                                        {Object.entries(r.moods||{}).map(([m,v]) => (
                                            <span key={m} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{m} {v}%</span>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-2 pt-3 border-t border-[#F3E5D8]">
                                        {r.diaryFields ? (
                                            [['f1','環境的質地'],['f2','留白時刻'],['f3','對自己的新發現'],['f4','內在的呼喚'],['f5','溫柔回應內在呼喚'],['f6','最深刻的一抹色彩']].map(([k,label]) =>
                                                r.diaryFields[k] ? (
                                                    <p key={k} className="text-sm leading-relaxed line-clamp-1">
                                                        <span className="font-medium text-[#A89080]">{label}．</span>
                                                        <span className="font-light text-[#8D7B6D]">{r.diaryFields[k]}</span>
                                                    </p>
                                                ) : null
                                            )
                                        ) : (
                                            <p className="text-sm font-light text-[#8D7B6D] line-clamp-2 leading-relaxed">{r.sentence || ''}</p>
                                        )}
                                    </div>
                            )}
                            {(r.bodyLanguage || r.trueFeeling) && (
                                <div className="pt-1 border-t border-[#F3E5D8] space-y-1.5">
                                    {r.bodyLanguage && <p className="text-xs leading-relaxed line-clamp-2"><span className="text-[#A89080] font-medium">身體想告訴我 · </span><span className="text-[#8D7B6D]">{r.bodyLanguage}</span></p>}
                                    {r.trueFeeling && <p className="text-xs leading-relaxed line-clamp-2"><span className="text-[#A89080] font-medium">真實感受 · </span><span className="text-[#8D7B6D]">{r.trueFeeling}</span></p>}
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            </div>
        );
    }

    // 共用 DateTimeStep
    function DateTimeStep({ date, timeSlot, customTime, onUpdate, onNext, title }) {
        return (
            <div className="space-y-8 py-6 animate-fade-in">
                <p className="text-lg font-medium text-[#A89080] tracking-[0.2em] uppercase text-center">{title}</p>
                <div className="bg-[#F3E5D8]/30 py-4 px-6 rounded-[2rem] border border-[#F3E5D8] text-center">
                    <input type="date" value={date} onChange={e => onUpdate({date: e.target.value})} />
                </div>
                <div className="flex flex-wrap gap-2 justify-center">
                    {TIME_SLOTS.map(slot => (
                        <button key={slot} onClick={() => onUpdate({timeSlot: slot})} className={`px-5 py-2 rounded-full text-xs font-medium transition-all border whitespace-nowrap ${timeSlot === slot ? 'bg-[#C8A882] text-white border-[#C8A882]' : 'bg-white text-[#D1C4B9] border-[#F3E5D8]'}`}>{slot}</button>
                    ))}
                </div>
                {timeSlot === '自定義' && <input value={customTime} onChange={e => onUpdate({customTime: e.target.value})} placeholder="填寫具體時間..." className="w-full bg-[#F3E5D8]/10 p-4 rounded-xl text-center text-sm outline-none border border-[#D1C4B9] placeholder-[#A89080] text-[#C8A882] font-medium" />}
                <button onClick={onNext} className="w-full py-4 bg-[#C8A882] text-white rounded-2xl font-medium tracking-widest uppercase transition-transform active:scale-95 shadow-lg shadow-[#C8A882]/20">下一步</button>
            </div>
        );

    // 共用感受/心情選擇
    function SensationSelector({ groups, selected, onToggle, onIntensityChange, customInput, onCustomInput, onAddCustom, intensityLabel = "強度" }) {
        return (
            <div className="space-y-6">
                {groups.map(group => (
                    <div key={group.title} className="space-y-3">
                        <div className="border-l-2 border-[#C8A882] pl-3 py-0.5">
                            <h3 className="text-base font-medium text-[#C8A882] uppercase tracking-widest">{group.title}</h3>
                            <p className="text-xs text-[#D1C4B9] font-medium leading-relaxed mt-0.5">{group.desc}</p>
                        </div>
                        <div className="grid grid-cols-1 gap-3">
                            {group.items.map(item => {
                                const act = selected[item.label];
                                return (
                                    <div key={item.label} className={`rounded-[2rem] border transition-all p-5 bg-white ${act ? 'border-[#C8A882]' : 'border-[#F3E5D8]'}`}>
                                        <button onClick={() => onToggle(item.label)} className="w-full text-left flex justify-between items-start">
                                            <div className="pr-4">
                                                <p className={`text-sm font-medium tracking-wide ${act ? 'text-[#C8A882]' : 'text-[#8D7B6D]'}`}>{item.label}</p>
                                                <p className="text-xs text-[#D1C4B9] font-medium leading-tight mt-0.5">{item.sub}</p>
                                            </div>
                                            {act && <span className="text-[#C8A882]">✓</span>}
                                        </button>
                                        {act && (
                                            <div className="mt-4 pt-4 border-t border-dashed border-[#F3E5D8] space-y-2 animate-fade-in">
                                                <div className="flex justify-between text-xs font-medium text-[#C8A882] uppercase tracking-widest"><span>{intensityLabel}</span><span>{act}%</span></div>
                                                <input type="range" className="w-full" value={act} onChange={e => onIntensityChange(item.label, e.target.value)} />
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                ))}
                {/* 自定義 */}
                <div className="space-y-3">
                    {Object.keys(selected).filter(k => !groups.flatMap(g => g.items).some(i => i.label === k)).map(k => (
                        <div key={k} className="rounded-[2rem] border border-[#C8A882] p-5 bg-white animate-fade-in">
                            <div className="flex justify-between items-center mb-3">
                                <p className="text-sm font-medium text-[#C8A882]">{k}</p>
                                <button onClick={() => onToggle(k)} className="text-xs text-[#A89080]">✕</button>
                            </div>

    function DiaryRecorder({ onSave, onCancel }) {
        const PROMPTS = [
            "如果此刻你的心是一張紙，它是平整的還是充滿摺痕的？",
            "今天你的頻率在哪個狀態上最讓自己舒服？",
            "試著捕捉一個你今天「照顧了自己」的細微動作。",
            "今天有什麼時刻，你感覺到自己真實存在著？",
            "如果把今天的狀態用一種天氣描述，是什麼天氣？",
            "今天的你，最需要被什麼溫柔對待？",
        ];
        const DIARY_FIELDS = [
            { key: 'f1', label: '環境的質地', placeholder: '記下今天所處環境帶給我的感覺' },
            { key: 'f2', label: '留白時刻', placeholder: '記下今天把時間留給自己的時刻' },
            { key: 'f3', label: '對自己的新發現', placeholder: '記下過去未曾注意過的自己' },
            { key: 'f4', label: '內在的呼喚', placeholder: '記下今天想被幫忙的時刻' },
            { key: 'f5', label: '溫柔回應內在呼喚', placeholder: '如果是你最重視的人需要你寫在上方的幫忙，你會如何回應' },
            { key: 'f6', label: '最深刻的一抹色彩', placeholder: '記下今天最印象深刻的事情' },
        ];
        const [prompt] = useState(() => PROMPTS[Math.floor(Math.random() * PROMPTS.length)]);
        const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
        const [fields, setFields] = useState({ f1: '', f2: '', f3: '', f4: '', f5: '', f6: '' });
        const [selected, setSelected] = useState(null); // null = step1, array = step2
        const setF = (k, v) => setFields(prev => ({...prev, [k]: v}));
        const hasContent = Object.values(fields).some(v => v.trim());

        const toggleSelect = (key) => {
            setSelected(prev => {
                const arr = prev || [];
                return arr.includes(key) ? arr.filter(k => k !== key) : [...arr, key];
            });
        };

        // Step 1: pick which fields
        if (selected === null) {
            return (
                <div className="p-8 space-y-8 pb-32 animate-fade-in">
                    <div className="flex justify-between items-center">
                        <button onClick={onCancel} className="text-[#A89080] text-xl transition-transform active:scale-95">✕</button>
                        <Icon.Diary />
                    </div>
                    <div className="bg-[#F3E5D8]/30 py-4 px-6 rounded-[2rem] border border-[#F3E5D8] text-center">
                        <input type="date" value={date} onChange={e => setDate(e.target.value)} />
                    </div>
                    <div className="space-y-4">
                        <p className="text-sm font-light text-[#A89080] tracking-widest text-center">你今天想記錄的是...</p>
                        <div className="space-y-3">
                            {DIARY_FIELDS.map(f => {
                                const isOn = (selected||[]).includes(f.key);
                                return (
                                    <button key={f.key} onClick={() => toggleSelect(f.key)}
                                        className={`w-full flex justify-between items-center p-5 rounded-[2rem] border transition-all text-left ${isOn ? 'border-[#C8A882] bg-white' : 'border-[#F3E5D8] bg-white'}`}>
                                        <span className={`text-sm font-medium tracking-wide ${isOn ? 'text-[#C8A882]' : 'text-[#8D7B6D]'}`}>{f.label}</span>
                                        <span className={`text-sm transition-all ${isOn ? 'text-[#C8A882]' : 'text-[#D1C4B9]'}`}>{isOn ? '✓' : '+'}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    <button
                        disabled={!(selected||[]).length}
                        onClick={() => setSelected(s => s || [])}
                        className="w-full py-5 rounded-[1.5rem] transition-all font-medium tracking-widest bg-[#C8A882] text-white disabled:opacity-30">
                        開始今天的覺察 →
                    </button>
                </div>
            );
        }

        // Step 2: write content for selected fields
        const activeFields = DIARY_FIELDS.filter(f => selected.includes(f.key));
        return (
            <div className="p-8 space-y-8 pb-32 animate-fade-in">
                <div className="flex justify-between items-center">
                    <button onClick={() => setSelected(null)} className="text-[#A89080] text-sm font-light tracking-wide">← 重新選擇</button>
                    <Icon.Diary />
                </div>
                {/* 動態 prompt */}
                <div className="px-2">
                    <p className="text-sm text-[#C8A882]/70 leading-relaxed font-light italic text-center tracking-wide">「{prompt}」</p>
                </div>
                {activeFields.map(f => (
                    <div key={f.key} className="space-y-2">
                        <p className="text-sm font-medium text-[#A89080] tracking-widest ml-1">{f.label}</p>
                        <div className="bg-[#F3E5D8]/50 rounded-[2.5rem] p-6 border border-[#D1C4B9]">
                            <textarea value={fields[f.key]} onChange={e => setF(f.key, e.target.value)} placeholder={f.placeholder} className="w-full bg-transparent text-[#C8A882] text-sm outline-none h-24 resize-none leading-relaxed font-medium placeholder-[#D1C4B9]" />
                        </div>
                    </div>
                ))}
                <button disabled={!hasContent} onClick={() => onSave({ type: 'diary', date, sentence: fields.f3 || fields.f1 || '', learning: fields.f6 || '', diaryFields: fields, timeSlot: '全天' })} className="w-full py-5 rounded-[1.5rem] transition-all font-medium tracking-widest shadow-lg bg-[#C8A882] text-white shadow-[#C8A882]/20 disabled:opacity-30">儲存這天的覺察</button>
            </div>
        );
    }

    function LabDetailModal({ record, onClose, onDeleteLab, onUpdateLab }) {
        const [editingId, setEditingId] = useState(null);

            setEditingId(l.id);
            setEditVal({ action: l.action, effect: l.effect });

            setEditingId(null);

        const handleDelete = (labId) => {
            if (window.confirm('確定要刪除這筆對策嗎？')) {
                const remaining = (record.lab||[]).filter(l => l.id !== labId);

            <div className="fixed inset-0 z-[100] animate-fade-in flex items-center justify-center px-6" onClick={onClose}>

                                        </div>
                                    </>
                                )}
                            </div>
                        ))}
                    </div>
                    <button onClick={onClose} className="w-full py-4 bg-[#C8A882] text-white rounded-2xl font-medium tracking-widest uppercase transition-transform active:scale-95">關閉</button>
                </div>
            </div>
        );
    }

        function CalendarPage({ records, setRecords, onDetail }) {
        const today = new Date().toISOString().slice(0, 10);
        const [labDetail, setLabDetail] = useState(null);
        const [selectedDate, setSelectedDate] = useState(today);
        const filtered = records.filter(r => r.date === selectedDate);
        const mapTitle = { body: '身體覺察', mood: '心情能量', diary: '日記隨想', lab: '實驗對策' };
        return (
            <div className="p-8 space-y-10 animate-fade-in pb-32">
                <header className="pt-4 flex justify-between items-end text-[#C8A882] uppercase tracking-[0.2em] font-medium">
                    <h2 className="text-2xl font-light text-[#C8A882] tracking-[0.3em] uppercase">Calendar</h2>
                    <Icon.Calendar />
                </header>
                <div className="grid grid-cols-7 gap-2">
                    {Array.from({length: 31}, (_, i) => {
                        const ds = `2026-03-${String(i+1).padStart(2, '0')}`;
                        const has = records.some(r => r.date === ds);
                        const isToday = ds === today;
                        const isSelected = ds === selectedDate;
                        return (
                            <button key={i} onClick={() => setSelectedDate(ds)} className={`aspect-square rounded-xl flex items-center justify-center text-[13px] font-medium transition-all
                                ${isSelected && !isToday ? 'border-2 border-[#C8A882] text-[#C8A882]' : ''}
                                ${isToday ? 'bg-[#C8A882] text-white ring-2 ring-[#C8A882] ring-offset-1' : ''}
                                ${!isToday && !isSelected && has ? 'bg-[#F3E5D8] text-[#C8A882]' : ''}
                                ${!isToday && !isSelected && !has ? 'bg-[#F3E5D8]/20 text-[#A89080] border border-[#F3E5D8]' : ''}
                            `}>{i + 1}</button>
                        );
                    })}
                </div>
                <div className="space-y-10">
                    <h3 className="text-xs font-bold text-[#C8A882] tracking-[0.2em] border-b border-[#F3E5D8] pb-2 uppercase">{selectedDate} Journey</h3>
                    {['body', 'mood', 'diary', 'lab'].map(type => {
                        const items = type === 'lab' ? filtered.filter(f => f.lab && f.lab.length > 0) : filtered.filter(f => f.type === type);
                        if (items.length === 0) return null;
                        return (
                            <div key={type} className="space-y-4 animate-fade-in">
                                <p className="text-xs font-medium text-[#A89080] tracking-widest uppercase ml-2">— {mapTitle[type]}</p>
                                {items.map(i => (
                                    <div key={i.id} onClick={() => type === 'lab' ? setLabDetail(i) : onDetail(i)} className="p-5 border border-[#F3E5D8] rounded-[1.5rem] bg-white hover:bg-[#F3E5D8]/10 cursor-pointer transition-all">
                                        {type === 'body' && <h3 className="text-sm font-medium text-[#C8A882] truncate tracking-wide">{i.area ? i.area + ' · ' : ''}{i.side ? i.side.join(', ') : ''}{i.part} : {i.sensationData.map(s => s.label).join(', ')}</h3>}
                                        {type === 'mood' && <h3 className="text-sm font-medium text-[#C8A882]">{Object.keys(i.moods).join(', ')}</h3>}
                                        {type === 'diary' && <h3 className="text-sm font-medium text-[#C8A882] truncate tracking-wide">"{i.sentence}"</h3>}
                                        {type === 'lab' && (
                                            <div className="space-y-3">
                                                <h3 className="text-sm font-medium text-[#C8A882]">
                                                    {i.type === 'body'
                                                        ? `${i.area ? i.area + ' · ' : ''}${i.side?i.side.join(''):''}${i.part} : ${i.sensationData?.map(s=>s.label).join(', ')}`
                                                        : Object.keys(i.moods||{}).join(', ')}
                                                </h3>
                                                <p className="text-xs text-[#A89080] font-medium">對策：{i.lab[0]?.action}{i.lab.length > 1 ? ` 等 ${i.lab.length} 筆` : ''}</p>
                                            </div>
                                        )}
                                        <p className="text-xs text-[#D1C4B9] uppercase mt-1 tracking-widest font-medium">{i.timeSlot}</p>
                                    </div>
                                ))}
                            </div>
                        );
                    })}
                    {filtered.length === 0 && <p className="text-center py-20 text-xs text-[#D1C4B9] uppercase font-medium tracking-widest animate-fade-in">Gently Left Blank.</p>}
                </div>

                {labDetail && (
                    <LabDetailModal
                        record={labDetail}
                        onClose={() => setLabDetail(null)}
                        onDeleteLab={(labId, isEmpty) => {
                            const updatedLab = (labDetail.lab||[]).filter(l => l.id !== labId);
                            if (isEmpty) {
                                // 清空 lab 但保留原始身體/心情紀錄
                                setRecords(records.map(r => r.id === labDetail.id ? { ...r, lab: [] } : r));
                                setLabDetail(null);
                            } else {
                                const updated = { ...labDetail, lab: updatedLab };
                                setRecords(records.map(r => r.id === labDetail.id ? updated : r));
                                setLabDetail(updated);
                            }
                        }}
                        onUpdateLab={(labId, updated) => {
                            const updatedLab = (labDetail.lab||[]).map(l => l.id === labId ? updated : l);
                            const updatedRecord = { ...labDetail, lab: updatedLab };
                            setRecords(records.map(r => r.id === labDetail.id ? updatedRecord : r));
                            setLabDetail(updatedRecord);
                        }}
                    />
                )}
            </div>
        );
    }

    function TrendPage({ records }) {
        const [month, setMonth] = useState('2026-03');
        useEffect(() => {
            const CATEGORIES = ["頭部", "頸部", "手部", "胸腹", "背腰部", "腿部"];
            const createLineChart = (id, data, color, bgColor) => {
                const ctx = document.getElementById(id); if(!ctx) return;
                const old = Chart.getChart(ctx); if(old) old.destroy();
                new Chart(ctx, { type: 'line', data: { labels: Array.from({length:31},(_,i)=>i+1), datasets: [{ data, borderColor: color, tension: 0.4, fill: !!bgColor, backgroundColor: bgColor, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, min: 0, max: 100 }, x: { grid: { display: false }, ticks: { color: '#D1C4B9', font: { size: 8 } } } } } });
            };
            const dailyMax = Array.from({length: 31}, (_, i) => { const ds = `${month}-${String(i+1).padStart(2, '0')}`; const dayRecs = records.filter(r => r.date === ds && r.type === 'body'); return dayRecs.length > 0 ? Math.max(...dayRecs.flatMap(dr => dr.sensationData.map(s => parseInt(s.intensity)))) : 0; });
            createLineChart('chart-body-trend', dailyMax, '#C8A882');
            const moodAvg = Array.from({length: 31}, (_, i) => { const ds = `${month}-${String(i+1).padStart(2, '0')}`; const dayRecs = records.filter(r => r.date === ds && r.type === 'mood'); if(dayRecs.length === 0) return 0; const vals = dayRecs.flatMap(dr => Object.values(dr.moods).map(v => parseInt(v))); return vals.reduce((a,b)=>a+b,0) / vals.length; });
            createLineChart('chart-mood-trend', moodAvg, '#D1C4B9', '#D1C4B922');
            const ctxLab = document.getElementById('chart-lab-trend'); if(ctxLab) { const old = Chart.getChart(ctxLab); if(old) old.destroy(); const labEff = Array.from({length: 31}, (_, i) => { const ds = `${month}-${String(i+1).padStart(2, '0')}`; const dayRecs = records.filter(r => r.date === ds && r.lab && r.lab.length > 0); if(dayRecs.length === 0) return 0; const vals = dayRecs.flatMap(r => r.lab.map(l => parseInt(l.effect))); return vals.reduce((a,b)=>a+b,0) / vals.length; }); new Chart(ctxLab, { type: 'bar', data: { labels: Array.from({length:31},(_,i)=>i+1), datasets: [{ data: labEff, backgroundColor: '#F3E5D8', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, min: 0, max: 100 }, x: { grid: { display: false }, ticks: { color: '#D1C4B9', font: { size: 8 } } } } } }); }
            CATEGORIES.forEach(cat => { const canvas = document.getElementById(`chart-${cat}`); if (!canvas) return; const old = Chart.getChart(canvas); if(old) old.destroy(); const filtered = records.filter(r => r.area === cat && r.date.startsWith(month)).flatMap(r => r.sensationData.map(s => s.label)); const counts = filtered.reduce((a, b) => { a[b] = (a[b] || 0) + 1; return a; }, {}); new Chart(canvas, { type: 'bar', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: '#C8A882' }] }, options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#C8A882', font: { size: 10 } } }, y: { grid: { display: false }, ticks: { color: '#C8A882', font: { size: 10 } } } } } }); });
        }, [records, month]);
        return (
            <div className="p-8 space-y-12 animate-fade-in pb-32 text-center">
                <header className="pt-4 flex items-center justify-center gap-3">
                    <Icon.Trend />
                    <h2 className="text-2xl font-light text-[#C8A882] tracking-[0.3em]">趨勢圖</h2>
                </header>
                <div className="flex justify-center border-b border-[#F3E5D8] pb-4">
                    <input type="month" value={month} onChange={e => setMonth(e.target.value)} className="bg-transparent text-xl font-medium tracking-widest text-[#C8A882] outline-none text-center" />
                </div>
                <section className="space-y-4"><h3 className="text-sm font-medium text-[#C8A882] tracking-[0.2em] uppercase text-center">身體覺察 (不適指數 MAX)</h3><div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-56"><canvas id="chart-body-trend"></canvas></div></section>
                <section className="space-y-4"><h3 className="text-sm font-medium text-[#C8A882] tracking-[0.2em] uppercase text-center">心情能量 (平均基調 AVG)</h3><div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-56"><canvas id="chart-mood-trend"></canvas></div></section>
                <section className="space-y-4"><h3 className="text-sm font-medium text-[#C8A882] tracking-[0.2em] uppercase text-center">回應成效 (平均回應率 AVG)</h3><div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-56"><canvas id="chart-lab-trend"></canvas></div></section>
                <section className="space-y-10 pt-10 border-t border-[#F3E5D8]">
                    <h2 className="text-xl font-medium text-[#C8A882] tracking-[0.3em] uppercase text-center">局部頻率統計</h2>
                    {["頭部", "頸部", "手部", "胸腹", "背腰部", "腿部"].map(cat => (
                        <div key={cat} className="space-y-4">
                            <h3 className="text-[13px] font-medium text-[#C8A882] tracking-widest uppercase text-center">— {cat} 感受頻率</h3>
                            <div className="bg-white border border-[#F3E5D8] p-6 rounded-[2.5rem] h-48"><canvas id={`chart-${cat}`}></canvas></div>
                        </div>
                    ))}
                </section>
            </div>
        );
    }

    function MiniLab({ records, setRecords, onDetail }) {
        const today = new Date().toISOString().slice(0, 10);
        const [selectedDate, setSelectedDate] = useState(today);
        const [expId, setExpId] = useState(null);
        const [newLab, setNewLab] = useState({ action: '', effect: 0 });

        // 當月所有天（固定顯示當月）
        const [viewMonth] = useState(today.slice(0, 7));
        const daysInMonth = new Date(parseInt(viewMonth.slice(0,4)), parseInt(viewMonth.slice(5,7)), 0).getDate();
        const monthPrefix = viewMonth; // e.g. "2026-03"

        const filtered = records.filter(r => r.date === selectedDate && r.type !== 'diary');

        const saveLab = (recordId) => {
            if (!newLab.action.trim()) return;
            setRecords(records.map(r => {
                if (r.id !== recordId) return r;
                const existing = r.lab || [];
                return { ...r, lab: [...existing, { ...newLab, id: Date.now() }] };
            }));
            setExpId(null);
            setNewLab({ action: '', effect: 0 });
        };

        const deleteLab = (recordId, labId) => {
            if (!window.confirm("確定要刪除這筆對策紀錄嗎？")) return;
            setRecords(records.map(r => {
                if (r.id !== recordId) return r;
                return { ...r, lab: (r.lab || []).filter(l => l.id !== labId) };
            }));
        };

        return (
            <div className="p-8 space-y-8 animate-fade-in pb-32">
                <header className="pt-4 flex items-center gap-3">
                    <Icon.Calendar />
                    <h2 className="text-2xl font-light text-[#C8A882] tracking-[0.3em]">調頻月曆</h2>
                </header>

                {/* 月曆 */}
                <div className="grid grid-cols-7 gap-2">
                    {Array.from({length: daysInMonth}, (_, i) => {
                        const ds = `${monthPrefix}-${String(i+1).padStart(2, '0')}`;
                        const has = records.some(r => r.date === ds && r.type !== 'diary');
                        const isToday = ds === today;
                        const isSelected = ds === selectedDate;
                        return (
                            <button key={i} onClick={() => { setSelectedDate(ds); setExpId(null); }} className={`aspect-square rounded-xl flex items-center justify-center text-[13px] font-medium transition-all
                                ${isSelected && !isToday ? 'border-2 border-[#C8A882] text-[#C8A882]' : ''}
                                ${isToday && isSelected ? 'bg-[#C8A882] text-white ring-2 ring-[#C8A882] ring-offset-1' : ''}
                                ${isToday && !isSelected ? 'bg-[#C8A882] text-white' : ''}
                                ${!isToday && !isSelected && has ? 'bg-[#F3E5D8] text-[#C8A882]' : ''}
                                ${!isToday && !isSelected && !has ? 'bg-[#F3E5D8]/20 text-[#A89080] border border-[#F3E5D8]' : ''}
                            `}>{i + 1}</button>
                        );
                    })}
                </div>

                {/* 日期標題 */}
                <h3 className="text-xs font-medium text-[#C8A882] tracking-[0.2em] border-b border-[#F3E5D8] pb-2">{selectedDate} · 今日記事與溫柔回應</h3>

                {/* 當日紀錄 */}
                <div className="space-y-6">
                    {filtered.length === 0 && (
                        <p className="text-center py-16 text-xs text-[#D1C4B9] uppercase font-medium tracking-widest animate-fade-in">Gently Left Blank.</p>
                    )}
                    {filtered.map(r => (
                        <div key={r.id} className="p-6 border border-[#F3E5D8] rounded-[2rem] bg-white cursor-pointer space-y-3">
                            {/* 標題列：症狀 + 新增回應按鈕 */}
                            <div className="flex justify-between items-start gap-3">
                                <div className="space-y-1 min-w-0 flex-1" onClick={() => onDetail(r)}>
                                    <span className="text-xs font-medium text-[#D1C4B9] uppercase tracking-widest">{r.timeSlot}</span>
                                    {r.type === 'body' ? (
                                        <div className="space-y-2 mt-1">
                                            <p className="text-sm font-medium text-[#C8A882] tracking-wide">{r.area ? r.area + ' · ' : ''}{r.side?r.side.join(''):''}{r.part}</p>
                                            {(r.sensationData||[]).length > 0 && (
                                                <div className="flex flex-wrap gap-1.5 pt-2 border-t border-[#F3E5D8]">
                                                    {(r.sensationData||[]).map((s,i) => (
                                                        <span key={i} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{s.label} {s.intensity}%</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="space-y-2 mt-1">
                                            <p className="text-sm font-medium text-[#C8A882] tracking-wide">{Object.keys(r.moods||{}).slice(0,2).join(' · ')}{Object.keys(r.moods||{}).length > 2 ? ' ...' : ''}</p>
                                            <div className="flex flex-wrap gap-1.5 pt-2 border-t border-[#F3E5D8]">
                                                {Object.entries(r.moods||{}).map(([m,v]) => (
                                                    <span key={m} className="text-xs bg-[#F3E5D8]/60 text-[#C8A882] px-2.5 py-1 rounded-full font-medium">{m} {v}%</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => setExpId(expId === r.id ? null : r.id)} className="text-xs font-medium text-[#C8A882] border border-[#C8A882]/40 px-3 py-1.5 rounded-full hover:bg-[#C8A882] hover:text-white transition-all shrink-0 whitespace-nowrap mt-1">+ 回應</button>
                            </div>

                            {/* 身體想告訴我 */}
                            {r.bodyLanguage && (
                                <div className="pt-2 border-t border-[#F3E5D8]">
                                    <p className="text-xs leading-relaxed"><span className="text-[#A89080] font-medium">身體想告訴我 · </span><span className="text-[#8D7B6D] font-light">{r.bodyLanguage}</span></p>
                                </div>
                            )}

                            {/* 回應清單 */}
                            {(r.lab || []).length > 0 && (
                                <div className="pt-2 border-t border-[#F3E5D8] space-y-3">
                                    {(r.lab || []).map(l => (
                                        <div key={l.id} className="p-4 bg-[#F3E5D8]/30 rounded-[1.5rem] border border-[#F3E5D8] space-y-2 animate-fade-in">
                                            <div className="flex justify-between items-start gap-2">
                                                <div className="space-y-1 flex-1">
                                                    <p className="text-xs font-medium text-[#A89080] tracking-wide">回應方式</p>
                                                    <p className="text-sm font-light text-[#8D7B6D] leading-relaxed">{l.action}</p>
                                                </div>
                                                <button onClick={() => deleteLab(r.id, l.id)} className="text-xs text-[#D1C4B9] px-2 py-0.5 shrink-0">✕</button>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`text-xs font-medium px-3 py-1 rounded-full ${l.effect === 0 ? 'bg-[#F3E5D8]/60 text-[#D1C4B9]' : l.effect > 0 ? 'bg-[#C8A882]/15 text-[#C8A882]' : 'bg-[#A89080]/10 text-[#A89080]'}`}>
                                                    {l.effect > 0 ? '+' : ''}{l.effect * 10}%
                                                </span>
                                                <span className="text-xs text-[#A89080]">{l.effect === 0 ? '沒什麼感覺' : l.effect > 0 ? '有幫助' : '沒幫助'}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* 新增對策表單 */}
                            {expId === r.id && (
                                <div className="pt-4 border-t border-dashed border-[#F3E5D8] space-y-4 animate-fade-in">
                                    <textarea
                                        value={newLab.action}
                                        onChange={e => setNewLab({...newLab, action: e.target.value})}
                                        placeholder="記下你如何回應這個狀態，如：吃宵夜、去運動、多睡覺、吃藥..."
                                        className="w-full bg-[#F3E5D8]/30 p-5 rounded-2xl text-sm outline-none h-24 placeholder-[#C8A882]/40 font-medium border border-[#D1C4B9]"
                                    />
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-medium text-[#C8A882] uppercase tracking-widest"><span>回應成效</span><span style={{color: newLab.effect < 0 ? '#A89080' : '#C8A882'}}>{newLab.effect * 10}%</span></div>
                                        <div className="flex items-center gap-2 text-[10px] text-[#D1C4B9]"><span>負面</span><input type="range" min="-10" max="10" step="1" className="flex-1" value={newLab.effect} onChange={e => setNewLab({...newLab, effect: parseInt(e.target.value)})} /><span>正面</span></div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setExpId(null)} className="flex-1 text-xs text-[#A89080] font-medium uppercase tracking-widest">取消</button>
                                        <button onClick={() => saveLab(r.id)} disabled={!newLab.action.trim()} className="flex-[2.5] py-4 bg-[#C8A882] text-white rounded-2xl text-xs font-medium tracking-[0.2em] transition-transform active:scale-95 disabled:opacity-30 uppercase">儲存回應</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            </div>
        );
    }

        const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
